<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KazInni | Workspace Launcher</title>
    
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a0f1e 0%, #111827 100%);
            min-height: 100vh;
            padding: 1rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        
        .logo-img {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            object-fit: contain;
            background: white;
        }
        
        .logo-text h1 {
            font-size: 0.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f97316, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }
        
        .logo-text p {
            font-size: 0.55rem;
            color: #94a3b8;
            white-space: nowrap;
        }
        
        /* User Menu */
        .user-menu {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a2235;
            padding: 0.3rem 0.8rem 0.3rem 0.5rem;
            border-radius: 40px;
            border: 1px solid #334155;
            flex-shrink: 0;
            margin-left: auto;
        }
        
        .user-avatar {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #f97316, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.65rem;
            color: white;
            flex-shrink: 0;
        }
        
        .user-info-text {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        
        .user-name {
            font-size: 0.65rem;
            font-weight: 600;
            color: white;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100px;
        }
        
        .user-email {
            font-size: 0.55rem;
            color: #94a3b8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100px;
            line-height: 1.2;
        }
        
        .logout-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 0.25rem;
            border-radius: 8px;
            transition: all 0.2s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }
        
        .logout-btn:hover {
            color: #ef4444;
        }
        
        /* Welcome Section */
        .welcome-section {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
        }
        
        .welcome-title {
            font-size: 1rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.25rem;
        }
        
        .welcome-text {
            font-size: 0.7rem;
            color: #94a3b8;
        }
        
        .no-access {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }
        .no-access i {
            font-size: 3rem;
            opacity: 0.3;
            margin-bottom: 1rem;
        }
        .no-access h3 {
            color: white;
            margin-bottom: 0.5rem;
        }
        
        /* Section Title */
        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Workspace Grid */
        .workspace-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        
        /* Workspace Card */
        .workspace-card {
            background: #1a2235;
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid #334155;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .workspace-card:hover {
            transform: translateY(-3px);
            border-color: #f97316;
            box-shadow: 0 15px 30px -10px rgba(249, 115, 22, 0.2);
        }
        
        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            margin-bottom: 0.8rem;
        }
        
        .card-icon.mugs {
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.2), rgba(245, 158, 11, 0.1));
            color: #f97316;
        }
        
        .card-icon.delivery {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(139, 92, 246, 0.1));
            color: #a78bfa;
        }
        
        .card-icon.workfit {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.1));
            color: #10b981;
        }
        
        .card-icon.brandinn {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.2), rgba(79, 70, 229, 0.1));
            color: #818cf8;
        }
        
        .card-icon.print {
            background: linear-gradient(135deg, rgba(219, 39, 119, 0.2), rgba(219, 39, 119, 0.1));
            color: #ec4899;
        }
        
        .card-icon.dsog {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.2), rgba(236, 72, 153, 0.1));
            color: #ec4899;
        }
        
        .card-icon.fusion {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.1));
            color: #10b981;
        }
        
        .card-icon.heritage {
            background: linear-gradient(135deg, rgba(217, 70, 239, 0.2), rgba(217, 70, 239, 0.1));
            color: #d946ef;
        }
        
        .card-icon.ekazi {
            background: linear-gradient(135deg, rgba(5, 150, 105, 0.2), rgba(5, 150, 105, 0.1));
            color: #34d399;
        }
        
        .card-icon.epitome {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(59, 130, 246, 0.1));
            color: #60a5fa;
        }
        
        .card-icon.digital {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.2), rgba(14, 165, 233, 0.1));
            color: #38bdf8;
        }
        
        .card-icon.pickme {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(6, 182, 212, 0.1));
            color: #22d3ee;
        }
        
        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.3rem;
        }
        
        .card-desc {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 1rem;
            line-height: 1.4;
        }
        
        .card-stats {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            padding-top: 0.8rem;
            border-top: 1px solid #334155;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.6rem;
            color: #64748b;
        }
        
        .stat i {
            font-size: 0.5rem;
            color: #10b981;
        }
        
        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }
        
        .toast {
            background: #1a2235;
            border-left: 3px solid #10b981;
            padding: 0.7rem 1rem;
            border-radius: 12px;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
            max-width: 90%;
            pointer-events: auto;
        }
        
        .toast.error {
            border-left-color: #ef4444;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            body { padding: 0.8rem; }
            .workspace-grid { grid-template-columns: 1fr; }
            .workspace-card { padding: 1rem; }
            .card-icon { width: 42px; height: 42px; font-size: 1.3rem; }
            .header { gap: 0.6rem; }
            .logo-img { width: 32px; height: 32px; }
            .logo-text h1 { font-size: 0.8rem; }
            .user-menu { padding: 0.25rem 0.6rem 0.25rem 0.4rem; gap: 6px; }
            .user-avatar { width: 28px; height: 28px; font-size: 0.6rem; }
            .user-name { font-size: 0.6rem; max-width: 80px; }
            .user-email { font-size: 0.5rem; max-width: 80px; }
            .logout-btn { font-size: 0.7rem; }
        }
        
        @media (max-width: 380px) {
            .user-email { display: none; }
            .user-name { max-width: 60px; }
            .logo-text p { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="KazInni" class="logo-img">
                <div class="logo-text">
                    <h1>KazInni Assistant</h1>
                    <p>Workspace Launcher</p>
                </div>
            </div>
            
            <div class="user-menu" id="userMenu">
                <div class="user-avatar" id="userAvatar">KA</div>
                <div class="user-info-text">
                    <div class="user-name" id="userName">Loading...</div>
                    <div class="user-email" id="userEmail">...</div>
                </div>
                <button class="logout-btn" onclick="logout()" title="Sign Out">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
        
        <!-- Welcome Section -->
        <div class="welcome-section">
            <div class="welcome-title" id="welcomeTitle">Welcome back!</div>
            <div class="welcome-text">Select a workspace below to access your dashboard.</div>
        </div>
        
        <!-- Workspaces Section -->
        <div class="section-title">
            <i class="fas fa-th-large"></i> Your Workspaces
        </div>
        
        <div class="workspace-grid" id="workspaceGrid">
            <!-- Will be populated by JavaScript -->
        </div>
    </div>
    
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        
        // ===== COMPLETE WORKSPACE DEFINITIONS =====
        const ALL_WORKSPACES = [
            {
                id: 'workfit',
                name: 'WorkFit Club',
                description: 'Fitness Franchise Management - Manage clubs, trainers, equipment inventory, shop products, and member sessions.',
                icon: 'fa-dumbbell',
                iconClass: 'workfit',
                path: '/workspaces/workfit/index.html',
                features: ['Club Management', 'Trainers & Members', 'Equipment & Shop']
            },
            {
                id: 'mugs-n-dines',
                name: 'Mugs n Dines',
                description: 'Restaurant & Kitchen Management - Manage orders, menu, recipes, and catering events.',
                icon: 'fa-utensils',
                iconClass: 'mugs',
                path: '/workspaces/mugs-n-dines/index.html',
                features: ['Order Management', 'Menu & Recipes', 'Catering Events']
            },
            {
                id: 'pick-up',
                name: 'Pick-Up Deliveries',
                description: 'Delivery Management - Accept deliveries, track shipments, and manage routes.',
                icon: 'fa-truck-fast',
                iconClass: 'delivery',
                path: '/workspaces/pick-up/index.html',
                features: ['Accept Deliveries', 'Track Shipments', 'Navigation']
            },
            {
                id: 'pick-me',
                name: 'Pick-Me Rides',
                description: 'Ride-hailing Management - Manage drivers, rides, and customer requests.',
                icon: 'fa-taxi',
                iconClass: 'pickme',
                path: '/workspaces/pick-me/index.html',
                features: ['Driver Management', 'Ride Tracking', 'Customer Support']
            },
            {
                id: 'brandinn',
                name: 'BrandInn Business',
                description: 'Business Branding & Management - Manage businesses, branding, and website presence.',
                icon: 'fa-building',
                iconClass: 'brandinn',
                path: '/workspaces/brandinn/index.html',
                features: ['Business Listings', 'Branding', 'Subdomains']
            },
            {
                id: 'brandinn-print',
                name: 'BrandInn Print',
                description: 'Print & Merchandise Management - Manage print orders, designs, and merchandise.',
                icon: 'fa-print',
                iconClass: 'print',
                path: '/workspaces/brandinn-print/index.html',
                features: ['Print Orders', 'Design Management', 'Merchandise']
            },
            {
                id: 'dsog',
                name: 'DSOG Fashion',
                description: 'Fashion & Apparel Management - Manage fashion orders, inventory, and franchisees.',
                icon: 'fa-tshirt',
                iconClass: 'dsog',
                path: '/workspaces/dsog/index.html',
                features: ['Fashion Orders', 'Inventory', 'Franchisees']
            },
            {
                id: 'fusion-foods',
                name: 'Fusion Foods',
                description: 'Food & Grocery Supply Management - Manage food orders, inventory, and suppliers.',
                icon: 'fa-utensil-spoon',
                iconClass: 'fusion',
                path: '/workspaces/fusion-foods/index.html',
                features: ['Food Orders', 'Inventory', 'Suppliers']
            },
            {
                id: 'heritage',
                name: 'Heritage Ads',
                description: 'Outdoor Advertising Management - Manage ad listings, campaigns, and partners.',
                icon: 'fa-bullhorn',
                iconClass: 'heritage',
                path: '/workspaces/heritage/index.html',
                features: ['Ad Listings', 'Campaigns', 'Partners']
            },
            {
                id: 'heritage-marketplace',
                name: 'Heritage Marketplace',
                description: 'WhatsApp Marketplace Management - Manage orders, products, and partners.',
                icon: 'fa-store',
                iconClass: 'heritage',
                path: '/workspaces/heritage-marketplace/index.html',
                features: ['Orders', 'Products', 'Partners']
            },
            {
                id: 'ekazi',
                name: 'E-Kazi Tasks',
                description: 'Freelance Task Management - Manage taskers, tasks, and job postings.',
                icon: 'fa-tasks',
                iconClass: 'ekazi',
                path: '/workspaces/ekazi/index.html',
                features: ['Taskers', 'Task Management', 'Job Postings']
            },
            {
                id: 'epitome',
                name: 'Epitome Reviews',
                description: 'Real Estate & Car Sales Management - Manage property and vehicle listings.',
                icon: 'fa-home',
                iconClass: 'epitome',
                path: '/workspaces/epitome/index.html',
                features: ['Property Listings', 'Car Sales', 'Inquiries']
            },
            {
                id: 'digital-services',
                name: 'Digital Services',
                description: 'Digital Services & Solutions - Manage applications, clients, and payments.',
                icon: 'fa-globe',
                iconClass: 'digital',
                path: '/workspaces/digital-services/index.html',
                features: ['Applications', 'Clients', 'Payments']
            }
        ];

        function showToast(message, isError = false) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }
        
        function getInitials(name) {
            if (!name) return 'KA';
            return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        }
        
        function updateUserUI(user) {
            const displayName = user.displayName || user.email?.split('@')[0] || 'Assistant';
            const initials = getInitials(displayName);
            const email = user.email;
            
            document.getElementById('userName').textContent = displayName;
            document.getElementById('userEmail').textContent = email;
            document.getElementById('userAvatar').textContent = initials;
            document.getElementById('welcomeTitle').textContent = `Welcome back, ${displayName.split(' ')[0]}!`;
        }

        // ===== MAIN: Load workspaces based on user permissions =====
        async function loadUserWorkspaces() {
            const user = auth.currentUser;
            if (!user) {
                window.location.href = '/index.html';
                return;
            }
            
            updateUserUI(user);
            
            try {
                // Get user permissions from Firebase
                const permSnap = await db.ref(`workspacePermissions/${user.uid}`).once('value');
                const permissions = permSnap.exists() ? permSnap.val() : {};
                
                console.log('📋 User permissions:', permissions);
                
                // Filter workspaces based on permissions
                let accessibleWorkspaces = [];
                
                // If user has no permissions but is admin, show all
                if (Object.keys(permissions).length === 0) {
                    // Check if user is admin
                    const adminSnap = await db.ref(`admins/${user.uid}`).once('value');
                    if (adminSnap.val() === true) {
                        accessibleWorkspaces = ALL_WORKSPACES;
                        console.log('👑 Admin - showing all workspaces');
                    } else {
                        // No permissions - show empty state
                        document.getElementById('workspaceGrid').innerHTML = `
                            <div class="no-access" style="grid-column: 1 / -1;">
                                <i class="fas fa-lock"></i>
                                <h3>No Workspace Access</h3>
                                <p>You don't have permission to access any workspaces. Please contact your administrator.</p>
                            </div>
                        `;
                        return;
                    }
                } else {
                    // Filter workspaces by permissions
                    accessibleWorkspaces = ALL_WORKSPACES.filter(ws => {
                        // Check if user has permission for this workspace ID
                        return permissions[ws.id] === true;
                    });
                    
                    console.log('🔓 Accessible workspaces:', accessibleWorkspaces.map(w => w.name));
                }
                
                // Render workspaces
                renderWorkspaces(accessibleWorkspaces);
                
                // Show message if no workspaces
                if (accessibleWorkspaces.length === 0) {
                    document.getElementById('workspaceGrid').innerHTML = `
                        <div class="no-access" style="grid-column: 1 / -1;">
                            <i class="fas fa-lock"></i>
                            <h3>No Access</h3>
                            <p>You don't have permission to access any workspaces. Contact your administrator to request access.</p>
                        </div>
                    `;
                }
                
            } catch (error) {
                console.error('Error loading permissions:', error);
                showToast('Error loading workspace permissions', true);
            }
        }
        
        function renderWorkspaces(workspaces) {
            const grid = document.getElementById('workspaceGrid');
            
            grid.innerHTML = workspaces.map(ws => `
                <div class="workspace-card" onclick="navigateToWorkspace('${ws.path}')">
                    <div class="card-icon ${ws.iconClass}">
                        <i class="fas ${ws.icon}"></i>
                    </div>
                    <div class="card-title">${ws.name}</div>
                    <div class="card-desc">${ws.description}</div>
                    <div class="card-stats">
                        ${ws.features.map(f => `<div class="stat"><i class="fas fa-check-circle"></i> ${f}</div>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        window.navigateToWorkspace = function(path) {
            showToast(`Opening workspace...`, false);
            setTimeout(() => {
                window.location.href = path;
            }, 300);
        };
        
        window.logout = async function() {
            try {
                await auth.signOut();
                showToast('Signed out successfully', false);
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 500);
            } catch (error) {
                showToast('Error signing out', true);
            }
        };
        
        // Auth state listener
        auth.onAuthStateChanged((user) => {
            if (user) {
                loadUserWorkspaces();
            } else {
                window.location.href = '/index.html';
            }
        });
    </script>
</body>
</html>
