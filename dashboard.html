<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KazInni | Workspace Launcher</title>
    
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a0f1e 0%, #111827 100%);
            min-height: 100vh;
            padding: 1.5rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: contain;
            background: white;
        }
        
        .logo-text h1 {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f97316, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo-text p {
            font-size: 0.7rem;
            color: #94a3b8;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a2235;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            border: 1px solid #334155;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #f97316, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
        }
        
        .user-details {
            text-align: right;
        }
        
        .user-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
        }
        
        .user-email {
            font-size: 0.65rem;
            color: #94a3b8;
        }
        
        .logout-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0.3rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .logout-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
        
        /* Welcome Section */
        .welcome-section {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #334155;
        }
        
        .welcome-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.3rem;
        }
        
        .welcome-text {
            font-size: 0.75rem;
            color: #94a3b8;
        }
        
        /* Workspace Grid */
        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }
        
        .workspace-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.2rem;
            margin-bottom: 2rem;
        }
        
        .workspace-card {
            background: #1a2235;
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid #334155;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
        }
        
        .workspace-card:hover {
            transform: translateY(-4px);
            border-color: #f97316;
            box-shadow: 0 20px 35px -10px rgba(249, 115, 22, 0.2);
        }
        
        .card-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        
        .card-icon.mugs {
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.2), rgba(245, 158, 11, 0.1));
            color: #f97316;
        }
        
        .card-icon.delivery {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(139, 92, 246, 0.1));
            color: #a78bfa;
        }
        
        .card-title {
            font-size: 1rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.3rem;
        }
        
        .card-desc {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 1rem;
            line-height: 1.4;
        }
        
        .card-stats {
            display: flex;
            gap: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid #334155;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.65rem;
            color: #64748b;
        }
        
        .stat i {
            font-size: 0.55rem;
        }
        
        .stat.active {
            color: #10b981;
        }
        
        /* Loading State */
        .loading {
            text-align: center;
            padding: 3rem;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #334155;
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .toast {
            background: #1a2235;
            border-left: 3px solid #10b981;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }
        
        .toast.error {
            border-left-color: #ef4444;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .workspace-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
            .user-info { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="KazInni" class="logo-img">
                <div class="logo-text">
                    <h1>KazInni Assistant</h1>
                    <p>Workspace Launcher</p>
                </div>
            </div>
            <div class="user-info" id="userInfo">
                <div class="user-avatar" id="userAvatar">KA</div>
                <div class="user-details">
                    <div class="user-name" id="userName">Loading...</div>
                    <div class="user-email" id="userEmail">...</div>
                </div>
                <button class="logout-btn" onclick="logout()" title="Sign Out">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
        
        <!-- Welcome Section -->
        <div class="welcome-section">
            <div class="welcome-title" id="welcomeTitle">Welcome back!</div>
            <div class="welcome-text">Select a workspace below to access your dashboard. You have access to the following workspaces based on your account.</div>
        </div>
        
        <!-- Workspaces Section -->
        <div class="section-title">
            <i class="fas fa-th-large"></i> Available Workspaces
        </div>
        
        <div class="workspace-grid" id="workspaceGrid">
            <div class="loading">
                <div class="spinner"></div>
                <p style="color:#94a3b8;">Loading your workspaces...</p>
            </div>
        </div>
    </div>
    
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc",
            storageBucket: "mugera-e51cc.firebasestorage.app",
            messagingSenderId: "1024868637509",
            appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        
        // Workspace definitions
        const WORKSPACES = [
            {
                id: 'mugsndines',
                name: 'Mugs N Dines',
                description: 'Restaurant & Kitchen Management - Manage orders, menu, recipes, and catering events.',
                icon: 'fa-utensils',
                iconColor: 'mugs',
                path: '/workspaces/mugsndines/index.html',
                features: ['Order Management', 'Menu & Recipes', 'Catering Events', 'Kitchen Staff']
            },
            {
                id: 'delivery-assistants',
                name: 'Delivery Assistants',
                description: 'Delivery Management - Accept deliveries, track shipments, and manage routes.',
                icon: 'fa-truck-fast',
                iconColor: 'delivery',
                path: '/workspaces/delivery-assistants/index.html',
                features: ['Accept Deliveries', 'Track Shipments', 'Navigation', 'Delivery Proof']
            }
        ];
        
        let currentUser = null;
        let userWorkspaces = [];
        
        function showToast(message, isError = false) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }
        
        function getInitials(name) {
            if (!name) return 'KA';
            return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        }
        
        // Determine which workspaces user has access to
        async function getUserWorkspaces(userId, email) {
            const accessibleWorkspaces = [];
            
            try {
                // Check brandinn_users for assigned workspace
                const userSnap = await db.ref(`brandinn_users/${userId}`).once('value');
                let assignedWorkspace = null;
                
                if (userSnap.exists()) {
                    const userData = userSnap.val();
                    assignedWorkspace = userData.workspace || userData.businessSlug || userData.role;
                }
                
                // Check if user is a delivery assistant
                const driverSnap = await db.ref(`delivery_assistants/${userId}`).once('value');
                const isDriver = driverSnap.exists() && driverSnap.val().verified === true;
                
                // Check email patterns
                const emailLower = email.toLowerCase();
                const isKitchenEmail = emailLower.includes('kitchen') || emailLower.includes('chef') || emailLower.includes('mugs');
                const isDeliveryEmail = emailLower.includes('driver') || emailLower.includes('delivery') || emailLower.includes('rider');
                
                // Determine access based on all factors
                if (assignedWorkspace === 'mugsndines' || isKitchenEmail || (!isDriver && !isDeliveryEmail)) {
                    accessibleWorkspaces.push('mugsndines');
                }
                
                if (assignedWorkspace === 'delivery' || isDriver || isDeliveryEmail) {
                    accessibleWorkspaces.push('delivery-assistants');
                }
                
                // If no specific access determined, give both (for admins/testing)
                if (accessibleWorkspaces.length === 0) {
                    accessibleWorkspaces.push('mugsndines', 'delivery-assistants');
                }
                
                return accessibleWorkspaces;
                
            } catch (error) {
                console.error('Error determining workspaces:', error);
                return ['mugsndines']; // Default fallback
            }
        }
        
        // Render workspace cards
        function renderWorkspaces() {
            const grid = document.getElementById('workspaceGrid');
            const availableWorkspaces = WORKSPACES.filter(w => userWorkspaces.includes(w.id));
            
            if (availableWorkspaces.length === 0) {
                grid.innerHTML = `
                    <div style="text-align: center; padding: 3rem; background: #1a2235; border-radius: 20px;">
                        <i class="fas fa-ban" style="font-size: 3rem; color: #64748b; margin-bottom: 1rem; display: block;"></i>
                        <p style="color: #94a3b8;">No workspaces available for your account.</p>
                        <p style="font-size: 0.7rem; color: #64748b; margin-top: 0.5rem;">Please contact your administrator.</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = availableWorkspaces.map(ws => {
                const workspace = WORKSPACES.find(w => w.id === ws);
                return `
                    <div class="workspace-card" onclick="navigateToWorkspace('${workspace.path}')">
                        <div class="card-icon ${workspace.iconColor}">
                            <i class="fas ${workspace.icon}"></i>
                        </div>
                        <div class="card-title">${workspace.name}</div>
                        <div class="card-desc">${workspace.description}</div>
                        <div class="card-stats">
                            ${workspace.features.slice(0, 2).map(f => `
                                <div class="stat"><i class="fas fa-check-circle"></i> ${f}</div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        window.navigateToWorkspace = function(path) {
            showToast(`Opening workspace...`, false);
            setTimeout(() => {
                window.location.href = path;
            }, 300);
        };
        
        async function logout() {
            try {
                await auth.signOut();
                showToast('Signed out successfully', false);
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 500);
            } catch (error) {
                showToast('Error signing out', true);
            }
        }
        
        async function loadUser() {
            const user = auth.currentUser;
            if (!user) {
                window.location.href = '/index.html';
                return;
            }
            
            currentUser = user;
            
            // Update UI with user info
            const displayName = user.displayName || user.email?.split('@')[0] || 'Assistant';
            document.getElementById('userName').textContent = displayName;
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('userAvatar').textContent = getInitials(displayName);
            document.getElementById('welcomeTitle').textContent = `Welcome back, ${displayName.split(' ')[0]}!`;
            
            // Get user's accessible workspaces
            userWorkspaces = await getUserWorkspaces(user.uid, user.email);
            renderWorkspaces();
        }
        
        // Auth state listener
        auth.onAuthStateChanged((user) => {
            if (user) {
                loadUser();
            } else {
                window.location.href = '/index.html';
            }
        });
    </script>
</body>
</html>
