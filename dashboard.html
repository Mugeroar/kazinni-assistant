<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KazInni | Workspace Launcher</title>
    
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a0f1e 0%, #111827 100%);
            min-height: 100vh;
            padding: 1rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: contain;
            background: white;
        }
        
        .logo-text h1 {
            font-size: 1rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f97316, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo-text p {
            font-size: 0.55rem;
            color: #94a3b8;
        }
        
        /* Desktop User Menu */
        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a2235;
            padding: 0.4rem 1rem 0.4rem 0.6rem;
            border-radius: 40px;
            border: 1px solid #334155;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #f97316, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            color: white;
        }
        
        .user-info-text {
            text-align: right;
        }
        
        .user-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
        }
        
        .user-email {
            font-size: 0.6rem;
            color: #94a3b8;
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .logout-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0.3rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        /* Mobile Menu Button */
        .mobile-menu-btn {
            background: #1a2235;
            border: 1px solid #334155;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        
        /* Mobile Drawer */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            display: none;
            backdrop-filter: blur(4px);
        }
        
        .drawer {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: #1a2235;
            border-left: 1px solid #334155;
            transition: right 0.3s ease;
            z-index: 1001;
            display: flex;
            flex-direction: column;
        }
        
        .drawer.open {
            right: 0;
        }
        
        .drawer-header {
            padding: 1.5rem;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .drawer-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        .drawer-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #334155;
        }
        
        .drawer-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #f97316, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: white;
        }
        
        .drawer-info h4 {
            font-size: 0.85rem;
            color: white;
        }
        
        .drawer-info p {
            font-size: 0.65rem;
            color: #94a3b8;
        }
        
        .drawer-actions {
            padding: 1rem 1.5rem;
        }
        
        .drawer-logout {
            width: 100%;
            padding: 0.75rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #334155;
            border-radius: 12px;
            color: #ef4444;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        /* Welcome Section */
        .welcome-section {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
        }
        
        .welcome-title {
            font-size: 1rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.25rem;
        }
        
        .welcome-text {
            font-size: 0.7rem;
            color: #94a3b8;
        }
        
        /* Section Title */
        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Workspace Grid */
        .workspace-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }
        
        /* Skeleton Loader */
        .skeleton-card {
            background: #1a2235;
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid #334155;
        }
        
        .skeleton-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(90deg, #2d3748 25%, #374151 50%, #2d3748 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            margin-bottom: 1rem;
        }
        
        .skeleton-title {
            height: 20px;
            width: 60%;
            border-radius: 8px;
            background: linear-gradient(90deg, #2d3748 25%, #374151 50%, #2d3748 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            margin-bottom: 0.5rem;
        }
        
        .skeleton-desc {
            height: 40px;
            width: 100%;
            border-radius: 8px;
            background: linear-gradient(90deg, #2d3748 25%, #374151 50%, #2d3748 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            margin-bottom: 1rem;
        }
        
        .skeleton-stats {
            display: flex;
            gap: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid #334155;
        }
        
        .skeleton-stat {
            height: 16px;
            width: 80px;
            border-radius: 6px;
            background: linear-gradient(90deg, #2d3748 25%, #374151 50%, #2d3748 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        /* Workspace Card */
        .workspace-card {
            background: #1a2235;
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid #334155;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .workspace-card:hover {
            transform: translateY(-3px);
            border-color: #f97316;
            box-shadow: 0 15px 30px -10px rgba(249, 115, 22, 0.2);
        }
        
        .card-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin-bottom: 1rem;
        }
        
        .card-icon.mugs {
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.2), rgba(245, 158, 11, 0.1));
            color: #f97316;
        }
        
        .card-icon.delivery {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(139, 92, 246, 0.1));
            color: #a78bfa;
        }
        
        .card-title {
            font-size: 1rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.3rem;
        }
        
        .card-desc {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 1rem;
            line-height: 1.4;
        }
        
        .card-stats {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            padding-top: 0.8rem;
            border-top: 1px solid #334155;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.6rem;
            color: #64748b;
        }
        
        .stat i {
            font-size: 0.5rem;
            color: #10b981;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: #1a2235;
            border-radius: 20px;
            border: 1px solid #334155;
        }
        
        .empty-state i {
            font-size: 3rem;
            color: #64748b;
            margin-bottom: 1rem;
            display: block;
        }
        
        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }
        
        .toast {
            background: #1a2235;
            border-left: 3px solid #10b981;
            padding: 0.7rem 1rem;
            border-radius: 12px;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
            max-width: 90%;
            pointer-events: auto;
        }
        
        .toast.error {
            border-left-color: #ef4444;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            body { padding: 0.8rem; }
            
            .user-menu {
                display: none;
            }
            
            .mobile-menu-btn {
                display: flex;
            }
            
            .welcome-title {
                font-size: 0.9rem;
            }
            
            .workspace-grid {
                grid-template-columns: 1fr;
                gap: 0.8rem;
            }
            
            .workspace-card {
                padding: 1rem;
            }
            
            .card-icon {
                width: 44px;
                height: 44px;
                font-size: 1.4rem;
            }
        }
        
        @media (max-width: 480px) {
            .logo-img {
                width: 34px;
                height: 34px;
            }
            
            .logo-text h1 {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="KazInni" class="logo-img">
                <div class="logo-text">
                    <h1>KazInni Assistant</h1>
                    <p>Workspace Launcher</p>
                </div>
            </div>
            
            <!-- Desktop User Menu -->
            <div class="user-menu" id="desktopUserMenu">
                <div class="user-avatar" id="desktopAvatar">KA</div>
                <div class="user-info-text">
                    <div class="user-name" id="desktopName">Loading...</div>
                    <div class="user-email" id="desktopEmail">...</div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
            
            <!-- Mobile Menu Button -->
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        
        <!-- Welcome Section -->
        <div class="welcome-section">
            <div class="welcome-title" id="welcomeTitle">Welcome back!</div>
            <div class="welcome-text">Select a workspace below to access your dashboard.</div>
        </div>
        
        <!-- Workspaces Section -->
        <div class="section-title">
            <i class="fas fa-th-large"></i> Available Workspaces
        </div>
        
        <div class="workspace-grid" id="workspaceGrid">
            <!-- Skeleton Loaders -->
            <div class="skeleton-card">
                <div class="skeleton-icon"></div>
                <div class="skeleton-title"></div>
                <div class="skeleton-desc"></div>
                <div class="skeleton-stats">
                    <div class="skeleton-stat"></div>
                    <div class="skeleton-stat"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-icon"></div>
                <div class="skeleton-title"></div>
                <div class="skeleton-desc"></div>
                <div class="skeleton-stats">
                    <div class="skeleton-stat"></div>
                    <div class="skeleton-stat"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Mobile Drawer -->
    <div class="drawer-overlay" id="drawerOverlay">
        <div class="drawer" id="drawer">
            <div class="drawer-header">
                <div class="drawer-avatar" id="drawerAvatar">KA</div>
                <button class="drawer-close" id="drawerClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="drawer-user">
                <div>
                    <h4 id="drawerName">Loading...</h4>
                    <p id="drawerEmail">...</p>
                </div>
            </div>
            <div class="drawer-actions">
                <button class="drawer-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Sign Out
                </button>
            </div>
        </div>
    </div>
    
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc",
            storageBucket: "mugera-e51cc.firebasestorage.app",
            messagingSenderId: "1024868637509",
            appId: "1:1024868637509:web:321faecddce8f11d9cfc2c"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        
        // Workspace definitions (hardcoded - no Firebase needed)
        const WORKSPACES = [
            {
                id: 'mugsndines',
                name: 'Mugs N Dines',
                description: 'Restaurant & Kitchen Management - Manage orders, menu, recipes, and catering events.',
                icon: 'fa-utensils',
                iconColor: 'mugs',
                path: '/workspaces/mugsndines/index.html',
                features: ['Order Management', 'Menu & Recipes', 'Catering Events']
            },
            {
                id: 'delivery-assistants',
                name: 'Delivery Assistants',
                description: 'Delivery Management - Accept deliveries, track shipments, and manage routes.',
                icon: 'fa-truck-fast',
                iconColor: 'delivery',
                path: '/workspaces/delivery-assistants/index.html',
                features: ['Accept Deliveries', 'Track Shipments', 'Navigation']
            }
        ];
        
        let currentUser = null;
        let userWorkspaces = ['mugsndines', 'delivery-assistants']; // Default show all
        
        function showToast(message, isError = false) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas fa-${isError ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }
        
        function getInitials(name) {
            if (!name) return 'KA';
            return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        }
        
        // Simple workspace detection - always shows both workspaces
        // This prevents endless loading
        async function getUserWorkspaces(userId, email) {
            console.log('Getting workspaces for:', userId, email);
            
            // Default: show all workspaces so user always sees cards
            // You can customize this based on email or Firebase data
            const accessible = ['mugsndines', 'delivery-assistants'];
            
            // Optional: Check Firebase for specific assignment (with timeout)
            try {
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('Timeout')), 2000)
                );
                
                const userPromise = db.ref(`brandinn_users/${userId}`).once('value');
                const snapshot = await Promise.race([userPromise, timeoutPromise]);
                
                if (snapshot && snapshot.exists()) {
                    const userData = snapshot.val();
                    const assigned = userData.workspace || userData.businessSlug;
                    if (assigned === 'mugsndines') return ['mugsndines'];
                    if (assigned === 'delivery') return ['delivery-assistants'];
                }
            } catch (e) {
                console.log('Firebase check skipped or timeout - showing all workspaces');
            }
            
            return accessible;
        }
        
        // Render workspace cards
        function renderWorkspaces() {
            const grid = document.getElementById('workspaceGrid');
            const availableWorkspaces = WORKSPACES.filter(w => userWorkspaces.includes(w.id));
            
            if (availableWorkspaces.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-ban"></i>
                        <p>No workspaces available for your account.</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = availableWorkspaces.map(ws => {
                const workspace = WORKSPACES.find(w => w.id === ws);
                return `
                    <div class="workspace-card" onclick="navigateToWorkspace('${workspace.path}')">
                        <div class="card-icon ${workspace.iconColor}">
                            <i class="fas ${workspace.icon}"></i>
                        </div>
                        <div class="card-title">${workspace.name}</div>
                        <div class="card-desc">${workspace.description}</div>
                        <div class="card-stats">
                            ${workspace.features.map(f => `
                                <div class="stat"><i class="fas fa-check-circle"></i> ${f}</div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        window.navigateToWorkspace = function(path) {
            showToast(`Opening workspace...`, false);
            setTimeout(() => {
                window.location.href = path;
            }, 200);
        };
        
        async function logout() {
            try {
                await auth.signOut();
                showToast('Signed out successfully', false);
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 500);
            } catch (error) {
                showToast('Error signing out', true);
            }
        }
        
        // Update all UI elements with user data
        function updateUserUI(user) {
            const displayName = user.displayName || user.email?.split('@')[0] || 'Assistant';
            const initials = getInitials(displayName);
            const email = user.email;
            
            // Desktop
            document.getElementById('desktopName').textContent = displayName;
            document.getElementById('desktopEmail').textContent = email;
            document.getElementById('desktopAvatar').textContent = initials;
            
            // Mobile drawer
            document.getElementById('drawerName').textContent = displayName;
            document.getElementById('drawerEmail').textContent = email;
            document.getElementById('drawerAvatar').textContent = initials;
            
            // Welcome
            document.getElementById('welcomeTitle').textContent = `Welcome back, ${displayName.split(' ')[0]}!`;
        }
        
        // Mobile drawer controls
        function openDrawer() {
            document.getElementById('drawerOverlay').style.display = 'block';
            document.getElementById('drawer').classList.add('open');
        }
        
        function closeDrawer() {
            document.getElementById('drawerOverlay').style.display = 'none';
            document.getElementById('drawer').classList.remove('open');
        }
        
        async function loadUser() {
            const user = auth.currentUser;
            if (!user) {
                window.location.href = '/index.html';
                return;
            }
            
            currentUser = user;
            updateUserUI(user);
            
            // Load workspaces with timeout to prevent endless loading
            try {
                const timeoutPromise = new Promise((resolve) => {
                    setTimeout(() => {
                        console.log('Timeout - showing default workspaces');
                        resolve(['mugsndines', 'delivery-assistants']);
                    }, 3000);
                });
                
                const workspacesPromise = getUserWorkspaces(user.uid, user.email);
                userWorkspaces = await Promise.race([workspacesPromise, timeoutPromise]);
                
                renderWorkspaces();
            } catch (error) {
                console.error('Error loading workspaces, using defaults:', error);
                userWorkspaces = ['mugsndines', 'delivery-assistants'];
                renderWorkspaces();
            }
        }
        
        // Event listeners
        document.getElementById('mobileMenuBtn').addEventListener('click', openDrawer);
        document.getElementById('drawerClose').addEventListener('click', closeDrawer);
        document.getElementById('drawerOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeDrawer();
        });
        
        // Auth state listener
        auth.onAuthStateChanged((user) => {
            if (user) {
                loadUser();
            } else {
                window.location.href = '/index.html';
            }
        });
    </script>
</body>
</html>
