<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Trainer Hub | WorkFit Club</title>
  <meta name="theme-color" content="#f97316">
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --orange: #f97316; --orange-dark: #c2410c; --orange-light: #fb923c;
      --card-bg: #ffffff; --text-primary: #1e293b; --text-muted: #64748b;
      --border-light: #fed7aa; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #3b82f6;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #fff7ed 0%, #ffffff 100%);
      color: var(--text-primary); min-height: 100vh; padding-bottom: 80px;
    }
    .navbar {
      background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
      padding: 0.5rem 1rem; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 2px solid rgba(249,115,22,0.3); position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-img { height: 36px; width: 36px; border-radius: 10px; object-fit: contain; background: white; box-shadow: 0 4px 12px rgba(249,115,22,0.2); }
    .logo-text { font-weight: 800; font-size: 1rem; background: linear-gradient(145deg, #fb923c, #c2410c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .trainer-badge { background: var(--orange); color: white; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.6rem; font-weight: 700; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .menu-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--orange-dark); width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    
    /* Drawer */
    .drawer-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; backdrop-filter: blur(4px); }
    .drawer { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); transition: left 0.3s ease; z-index: 1001; display: flex; flex-direction: column; }
    .drawer.open { left: 0; }
    .drawer-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
    .drawer-close { background: none; border: none; color: #94a3b8; font-size: 1.2rem; cursor: pointer; }
    .drawer-user { padding: 1.2rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 12px; }
    .drawer-avatar { width: 44px; height: 44px; background: linear-gradient(135deg, #f97316, #c2410c); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; }
    .drawer-nav { flex: 1; padding: 1rem 0; }
    .drawer-nav-item { display: flex; align-items: center; gap: 12px; padding: 0.7rem 1.5rem; color: #cbd5e1; text-decoration: none; font-size: 0.8rem; transition: all 0.2s; cursor: pointer; }
    .drawer-nav-item:hover { background: rgba(249,115,22,0.15); color: var(--orange-light); }
    .drawer-nav-item i { width: 20px; }
    .drawer-footer { padding: 1rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); }
    .drawer-logout { width: 100%; padding: 0.7rem; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 12px; color: #ef4444; font-weight: 600; cursor: pointer; }

    .container { padding: 1rem; max-width: 1000px; margin: 0 auto; }
    .page-header { margin-bottom: 1rem; }
    .page-header h1 { font-size: 1.2rem; font-weight: 800; }
    .page-header p { font-size: 0.7rem; color: var(--text-muted); }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
    .stat-card { background: white; border-radius: 14px; padding: 0.7rem; text-align: center; border: 1px solid var(--border-light); }
    .stat-number { font-size: 1.3rem; font-weight: 800; color: var(--orange-dark); }
    .stat-label { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; }

    .tab-nav { display: flex; gap: 4px; background: #f8fafc; border-radius: 30px; padding: 4px; margin-bottom: 1rem; overflow-x: auto; }
    .tab-btn { flex: 1; min-width: fit-content; padding: 0.5rem 0.8rem; border-radius: 26px; border: none; background: transparent; font-weight: 600; font-size: 0.65rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .tab-btn.active { background: var(--orange); color: white; box-shadow: 0 4px 12px rgba(249,115,22,0.2); }

    .section { background: white; border-radius: 16px; padding: 1rem; border: 1px solid var(--border-light); margin-bottom: 1rem; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
    .section-header h3 { font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .add-btn { background: var(--orange); color: white; border: none; padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.65rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .add-btn:hover { background: var(--orange-dark); }
    .add-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .list-item { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid #f1f5f9; font-size: 0.75rem; }
    .list-item:last-child { border-bottom: none; }
    .badge { padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.6rem; font-weight: 600; }
    .badge.active { background: #d1fae5; color: #065f46; }
    .badge.inactive { background: #fee2e2; color: #991b1b; }
    .badge.sale { background: #fef3c7; color: #92400e; }
    .session-card { background: #fff7ed; border-radius: 12px; padding: 0.8rem; margin-bottom: 0.5rem; border-left: 3px solid var(--orange); }
    .session-card.done { opacity: 0.6; border-left-color: var(--success); }
    .session-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; }
    .session-time { font-size: 0.6rem; color: var(--text-muted); }
    .empty-state { text-align: center; padding: 1.5rem; color: #94a3b8; font-size: 0.75rem; }

    .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:2000; display:none; align-items:flex-end; justify-content:center; }
    .modal-overlay.show { display:flex; }
    .modal { background:white; border-radius:20px 20px 0 0; padding:1.2rem; width:100%; max-width:500px; max-height:85vh; overflow-y:auto; animation:slideUp 0.25s ease; }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
    .modal-header { display:flex; align-items:center; gap:8px; margin-bottom:1rem; padding-bottom:0.5rem; border-bottom:1px solid var(--border-light); }
    .modal-close { margin-left:auto; background:none; border:none; font-size:1.2rem; cursor:pointer; }
    .form-group { display:flex; flex-direction:column; gap:0.3rem; margin-bottom:0.8rem; }
    .form-group label { font-weight:600; font-size:0.7rem; color:#334155; }
    .form-group input, .form-group select, .form-group textarea { padding:0.6rem; border:1px solid #e2e8f0; border-radius:10px; font-family:'Inter',sans-serif; font-size:0.8rem; background:#f8fafc; outline:none; }
    .form-group input:focus, .form-group select:focus { border-color:var(--orange); }
    .submit-btn { background:var(--orange); color:white; border:none; padding:0.7rem; border-radius:12px; font-weight:700; font-size:0.8rem; cursor:pointer; width:100%; }
    .submit-btn:hover { background:var(--orange-dark); }
    .submit-btn:disabled { opacity:0.6; cursor:not-allowed; }
    .toast { position:fixed; bottom:20px; left:20px; right:20px; background:var(--success); color:white; padding:0.7rem; border-radius:12px; text-align:center; z-index:3000; display:none; font-size:0.8rem; }
    .toast.error { background:var(--danger); }
    .file-upload { border:2px dashed #e2e8f0; border-radius:12px; padding:1.5rem; text-align:center; cursor:pointer; margin-bottom:0.8rem; }
    .file-upload i { font-size:2rem; color:var(--orange); display:block; margin-bottom:0.5rem; }
    .file-item { display:flex; justify-content:space-between; align-items:center; padding:0.5rem; background:#f8fafc; border-radius:8px; margin-bottom:0.3rem; font-size:0.7rem; }

    .loading-spinner { display: flex; justify-content: center; padding: 2rem; }
    .spinner { width: 30px; height: 30px; border: 3px solid #fed7aa; border-top-color: #c2410c; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width:600px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .tab-btn { font-size: 0.6rem; padding: 0.4rem 0.6rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="Logo" class="logo-img">
      <span class="logo-text">WorkFit</span>
      <span class="trainer-badge" id="trainerClubName">Loading...</span>
    </div>
    <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
  </nav>

  <div class="drawer-overlay" id="drawerOverlay">
    <div class="drawer" id="drawer">
      <div class="drawer-header">
        <span style="color:white;font-weight:700;">Trainer Hub</span>
        <button class="drawer-close" id="drawerClose"><i class="fas fa-times"></i></button>
      </div>
      <div class="drawer-user">
        <div class="drawer-avatar" id="drawerAvatar">TR</div>
        <div style="color:white;"><h4 style="font-size:0.8rem;" id="drawerName">Trainer</h4><p style="font-size:0.6rem;color:#94a3b8;" id="drawerEmail">...</p></div>
      </div>
      <div class="drawer-nav">
        <a class="drawer-nav-item" onclick="switchTab('members')"><i class="fas fa-users"></i> Members</a>
        <a class="drawer-nav-item" onclick="switchTab('inventory')"><i class="fas fa-boxes-stacked"></i> Inventory</a>
        <a class="drawer-nav-item" onclick="switchTab('sales')"><i class="fas fa-cash-register"></i> Sales</a>
        <a class="drawer-nav-item" onclick="switchTab('sessions')"><i class="fas fa-calendar-week"></i> Weekly Sessions</a>
        <a class="drawer-nav-item" onclick="switchTab('downloads')"><i class="fas fa-download"></i> Downloads</a>
        <a class="drawer-nav-item" onclick="switchTab('uploads')"><i class="fas fa-upload"></i> Uploads</a>
      </div>
      <div class="drawer-footer">
        <button class="drawer-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-dumbbell"></i> Trainer Hub</h1>
      <p id="clubInfo">Loading your club...</p>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-number" id="statMembers">-</div><div class="stat-label">Members</div></div>
      <div class="stat-card"><div class="stat-number" id="statInventory">-</div><div class="stat-label">Items</div></div>
      <div class="stat-card"><div class="stat-number" id="statSales">-</div><div class="stat-label">Sales</div></div>
      <div class="stat-card"><div class="stat-number" id="statSessions">-</div><div class="stat-label">Sessions</div></div>
    </div>

    <div class="tab-nav" id="tabNav">
      <button class="tab-btn active" data-tab="members" onclick="switchTab('members')">👥 Members</button>
      <button class="tab-btn" data-tab="inventory" onclick="switchTab('inventory')">📦 Inventory</button>
      <button class="tab-btn" data-tab="sales" onclick="switchTab('sales')">💰 Sales</button>
      <button class="tab-btn" data-tab="sessions" onclick="switchTab('sessions')">📅 Sessions</button>
      <button class="tab-btn" data-tab="downloads" onclick="switchTab('downloads')">⬇️ Downloads</button>
      <button class="tab-btn" data-tab="uploads" onclick="switchTab('uploads')">⬆️ Uploads</button>
    </div>

    <div id="tabContent">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <script>
    // Initialize Firebase
    firebase.initializeApp({
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc"
    });
    
    const auth = firebase.auth();
    const db = firebase.database();

    // State
    let currentClubId = null;
    let currentClubName = '';
    let allMembers = {};
    let allInventory = {};
    let allSales = {};
    let allSessions = {};
    let currentTab = 'members';

    // Toast
    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = isError ? 'toast error' : 'toast';
      t.style.display = 'block';
      setTimeout(function() { t.style.display = 'none'; }, 3000);
    }

    function esc(s) { 
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); 
    }

    // Modal
    function openModal(html) {
      document.getElementById('modalContent').innerHTML = html;
      document.getElementById('modalOverlay').classList.add('show');
    }
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('show');
    }
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    // Find trainer's club
    async function findTrainerClub(user) {
      console.log('🔍 Looking for trainer:', user.email);
      
      try {
        // Get ALL trainers (no index needed)
        const snap = await db.ref('workfit_trainers').once('value');
        const trainers = snap.val() || {};
        
        for (const [id, t] of Object.entries(trainers)) {
          if (t.email && t.email.toLowerCase() === user.email.toLowerCase()) {
            console.log('✅ Found trainer:', t.name, '→ club:', t.clubName);
            return { clubId: t.clubId || t.assignedClubId || '', clubName: t.clubName || t.assignedClub || '' };
          }
          if (t.uid === user.uid) {
            console.log('✅ Found trainer by UID:', t.name);
            return { clubId: t.clubId || t.assignedClubId || '', clubName: t.clubName || t.assignedClub || '' };
          }
        }
      } catch(e) {
        console.error('Error reading trainers:', e);
      }
      
      // Fallback: check users node
      try {
        const userSnap = await db.ref('users/' + user.uid).once('value');
        if (userSnap.exists() && userSnap.val().clubId) {
          console.log('✅ Found club in users node');
          return { clubId: userSnap.val().clubId, clubName: userSnap.val().clubName || 'Club' };
        }
      } catch(e) {}
      
      console.log('❌ No club found');
      return null;
    }

    // Load all data - NO INDEXES NEEDED, filter in JS
    function loadData() {
      if (!currentClubId) return;
      
      console.log('📊 Loading data for club:', currentClubId);
      
      // Members
      db.ref('workfit_members').on('value', function(snap) {
        const data = snap.val() || {};
        allMembers = {};
        Object.entries(data).forEach(function([id, m]) {
          if (m && m.clubId === currentClubId) allMembers[id] = m;
        });
        console.log('👥 Members:', Object.keys(allMembers).length);
        updateStats();
        renderTab();
      }, function(err) {
        console.error('Members error:', err);
        updateStats();
        renderTab();
      });

      // Inventory
      db.ref('workfit_equipment_inventory').on('value', function(snap) {
        const data = snap.val() || {};
        allInventory = {};
        Object.entries(data).forEach(function([id, item]) {
          if (item && item.clubId === currentClubId) allInventory[id] = item;
        });
        console.log('📦 Inventory:', Object.keys(allInventory).length);
        updateStats();
        renderTab();
      }, function(err) {
        console.error('Inventory error:', err);
        updateStats();
        renderTab();
      });

      // Sales
      db.ref('workfit_revenue').on('value', function(snap) {
        const data = snap.val() || {};
        allSales = {};
        Object.entries(data).forEach(function([id, s]) {
          if (s && s.clubId === currentClubId) allSales[id] = s;
        });
        console.log('💰 Sales:', Object.keys(allSales).length);
        updateStats();
        renderTab();
      }, function(err) {
        console.error('Sales error:', err);
        updateStats();
        renderTab();
      });

      // Sessions
      db.ref('workfit_schedules').on('value', function(snap) {
        const data = snap.val() || {};
        allSessions = {};
        Object.entries(data).forEach(function([id, s]) {
          if (s && s.clubId === currentClubId) allSessions[id] = s;
        });
        console.log('📅 Sessions:', Object.keys(allSessions).length);
        updateStats();
        renderTab();
      }, function(err) {
        console.error('Sessions error:', err);
        updateStats();
        renderTab();
      });
    }

    function updateStats() {
      document.getElementById('statMembers').textContent = Object.keys(allMembers).length;
      document.getElementById('statInventory').textContent = Object.keys(allInventory).length;
      document.getElementById('statSales').textContent = Object.keys(allSales).length;
      document.getElementById('statSessions').textContent = Object.keys(allSessions).length;
    }

    // Tab switching
    window.switchTab = function(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === tab);
      });
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawerOverlay').style.display = 'none';
      renderTab();
    };

    function renderTab() {
      var c = document.getElementById('tabContent');
      if (!c) return;
      
      switch(currentTab) {
        case 'members': renderMembers(c); break;
        case 'inventory': renderInventory(c); break;
        case 'sales': renderSales(c); break;
        case 'sessions': renderSessions(c); break;
        case 'downloads': renderDownloads(c); break;
        case 'uploads': renderUploads(c); break;
      }
    }

    // === MEMBERS ===
    function renderMembers(c) {
      var members = Object.entries(allMembers).map(function(e) { return { id: e[0], data: e[1] }; });
      var html = '<div class="section"><div class="section-header"><h3><i class="fas fa-users"></i> Club Members (' + members.length + ')</h3><button class="add-btn" onclick="showAddMember()">+ Add</button></div>';
      
      if (members.length === 0) {
        html += '<div class="empty-state">No members yet. Tap "+ Add" to add your first member!</div>';
      } else {
        members.forEach(function(m) {
          html += '<div class="list-item"><div><strong>' + esc(m.data.name || m.data.fullName || 'Member') + '</strong><br><small>' + esc(m.data.membershipTier || 'Standard') + ' · ' + (m.data.phone || '—') + '</small></div>';
          html += '<div><span class="badge ' + (m.data.status === 'active' ? 'active' : 'inactive') + '">' + (m.data.status || 'active') + '</span>';
          html += '<button style="background:none;border:none;color:#ef4444;cursor:pointer;margin-left:8px;" onclick="removeMember(\'' + m.id + '\')"><i class="fas fa-trash"></i></button></div></div>';
        });
      }
      html += '</div>';
      c.innerHTML = html;
    }

    window.showAddMember = function() {
      openModal('<div class="modal-header"><h3><i class="fas fa-user-plus"></i> Add Member</h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div>' +
        '<div class="form-group"><label>Full Name *</label><input id="memName" placeholder="Member name"></div>' +
        '<div class="form-group"><label>Phone</label><input id="memPhone" placeholder="+254..."></div>' +
        '<div class="form-group"><label>Email</label><input id="memEmail" placeholder="email@..."></div>' +
        '<div class="form-group"><label>Membership Tier</label><select id="memTier"><option>Basic</option><option>Standard</option><option>Premium</option></select></div>' +
        '<button class="submit-btn" onclick="addMember()">Save Member</button>');
    };

    window.addMember = function() {
      var name = document.getElementById('memName').value.trim();
      if (!name) { showToast('Name is required', true); return; }
      
      db.ref('workfit_members').push({
        name: name, fullName: name,
        phone: document.getElementById('memPhone').value,
        email: document.getElementById('memEmail').value,
        membershipTier: document.getElementById('memTier').value,
        clubId: currentClubId, clubName: currentClubName,
        status: 'active',
        createdAt: firebase.database.ServerValue.TIMESTAMP
      }).then(function() {
        closeModal();
        showToast('Member added!');
      }).catch(function(e) {
        showToast('Error: ' + e.message, true);
      });
    };

    window.removeMember = function(id) {
      if (!confirm('Remove this member?')) return;
      db.ref('workfit_members/' + id).remove()
        .then(function() { showToast('Member removed'); })
        .catch(function(e) { showToast('Error: ' + e.message, true); });
    };

    // === INVENTORY ===
    function renderInventory(c) {
      var items = Object.entries(allInventory).map(function(e) { return { id: e[0], data: e[1] }; });
      var html = '<div class="section"><div class="section-header"><h3><i class="fas fa-boxes-stacked"></i> Equipment (' + items.length + ')</h3><button class="add-btn" onclick="showAddInventory()">+ Add</button></div>';
      
      if (items.length === 0) {
        html += '<div class="empty-state">No equipment. Tap "+ Add" to add items.</div>';
      } else {
        items.forEach(function(i) {
          html += '<div class="list-item"><div><strong>' + esc(i.data.name) + '</strong><br><small>' + esc(i.data.category || 'General') + ' · Qty: ' + (i.data.quantity || 1) + '</small></div>';
          html += '<div><span class="badge ' + ((i.data.condition || 'good') === 'good' ? 'active' : 'inactive') + '">' + (i.data.condition || 'good') + '</span>';
          html += '<button style="background:none;border:none;color:#ef4444;cursor:pointer;margin-left:8px;" onclick="removeInventory(\'' + i.id + '\')"><i class="fas fa-trash"></i></button></div></div>';
        });
      }
      html += '</div>';
      c.innerHTML = html;
    }

    window.showAddInventory = function() {
      openModal('<div class="modal-header"><h3><i class="fas fa-plus-circle"></i> Add Equipment</h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div>' +
        '<div class="form-group"><label>Name *</label><input id="invName" placeholder="Equipment name"></div>' +
        '<div class="form-group"><label>Category</label><select id="invCat"><option>Cardio</option><option>Strength</option><option>Flexibility</option><option>Machines</option><option>Accessories</option></select></div>' +
        '<div class="form-group"><label>Quantity</label><input id="invQty" type="number" value="1" min="1"></div>' +
        '<div class="form-group"><label>Condition</label><select id="invCond"><option>good</option><option>maintenance</option><option>damaged</option></select></div>' +
        '<button class="submit-btn" onclick="addInventory()">Save Equipment</button>');
    };

    window.addInventory = function() {
      var name = document.getElementById('invName').value.trim();
      if (!name) { showToast('Name is required', true); return; }
      
      db.ref('workfit_equipment_inventory').push({
        name: name,
        category: document.getElementById('invCat').value,
        quantity: Number(document.getElementById('invQty').value) || 1,
        condition: document.getElementById('invCond').value,
        clubId: currentClubId, clubName: currentClubName,
        createdAt: firebase.database.ServerValue.TIMESTAMP
      }).then(function() {
        closeModal();
        showToast('Equipment added!');
      }).catch(function(e) {
        showToast('Error: ' + e.message, true);
      });
    };

    window.removeInventory = function(id) {
      if (!confirm('Remove this item?')) return;
      db.ref('workfit_equipment_inventory/' + id).remove()
        .then(function() { showToast('Item removed'); })
        .catch(function(e) { showToast('Error: ' + e.message, true); });
    };

    // === SALES ===
    function renderSales(c) {
      var sales = Object.entries(allSales).map(function(e) { return { id: e[0], data: e[1] }; });
      var total = sales.reduce(function(sum, s) { return sum + (Number(s.data.amount) || 0); }, 0);
      var html = '<div class="section"><div class="section-header"><h3><i class="fas fa-cash-register"></i> Sales · KES ' + total.toLocaleString() + '</h3><button class="add-btn" onclick="showAddSale()">+ Sale</button></div>';
      
      if (sales.length === 0) {
        html += '<div class="empty-state">No sales recorded yet.</div>';
      } else {
        sales.forEach(function(s) {
          html += '<div class="list-item"><div><strong>' + esc(s.data.description || s.data.type || 'Sale') + '</strong><br><small>' + (s.data.date || '') + ' · ' + (s.data.customerName || '') + '</small></div>';
          html += '<div><span class="badge sale">KES ' + (s.data.amount || 0).toLocaleString() + '</span></div></div>';
        });
      }
      html += '</div>';
      c.innerHTML = html;
    }

    window.showAddSale = function() {
      openModal('<div class="modal-header"><h3><i class="fas fa-plus-circle"></i> Record Sale</h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div>' +
        '<div class="form-group"><label>Description *</label><input id="saleDesc" placeholder="e.g. Protein shake"></div>' +
        '<div class="form-group"><label>Amount (KES) *</label><input id="saleAmt" type="number" placeholder="500"></div>' +
        '<div class="form-group"><label>Customer Name</label><input id="saleCust" placeholder="Customer"></div>' +
        '<div class="form-group"><label>Type</label><select id="saleType"><option>Product</option><option>Membership</option><option>Session</option><option>Other</option></select></div>' +
        '<button class="submit-btn" onclick="addSale()">Record Sale</button>');
    };

    window.addSale = function() {
      var desc = document.getElementById('saleDesc').value.trim();
      var amt = document.getElementById('saleAmt').value;
      if (!desc || !amt) { showToast('Description and amount required', true); return; }
      
      db.ref('workfit_revenue').push({
        description: desc,
        type: document.getElementById('saleType').value,
        amount: Number(amt),
        customerName: document.getElementById('saleCust').value,
        clubId: currentClubId, clubName: currentClubName,
        date: new Date().toISOString().split('T')[0],
        createdAt: firebase.database.ServerValue.TIMESTAMP
      }).then(function() {
        closeModal();
        showToast('Sale recorded!');
      }).catch(function(e) {
        showToast('Error: ' + e.message, true);
      });
    };

    // === SESSIONS ===
    var weeklySessions = [
      { day: 'Monday', time: '6:00 AM - 7:00 AM', name: 'Morning Cardio Blast', type: 'Cardio' },
      { day: 'Monday', time: '5:00 PM - 6:00 PM', name: 'Strength Foundations', type: 'Strength' },
      { day: 'Tuesday', time: '6:00 AM - 7:00 AM', name: 'HIIT Power Hour', type: 'HIIT' },
      { day: 'Tuesday', time: '5:00 PM - 6:00 PM', name: 'Yoga Flow', type: 'Yoga' },
      { day: 'Wednesday', time: '6:00 AM - 7:00 AM', name: 'Spin & Burn', type: 'Spin' },
      { day: 'Wednesday', time: '5:00 PM - 6:00 PM', name: 'CrossFit Challenge', type: 'CrossFit' },
      { day: 'Thursday', time: '6:00 AM - 7:00 AM', name: 'Pilates Core', type: 'Pilates' },
      { day: 'Thursday', time: '5:00 PM - 6:00 PM', name: 'Zumba Party', type: 'Zumba' },
      { day: 'Friday', time: '6:00 AM - 7:00 AM', name: 'Full Body Strength', type: 'Strength' },
      { day: 'Friday', time: '5:00 PM - 6:00 PM', name: 'Cardio Kickboxing', type: 'Cardio' },
      { day: 'Saturday', time: '8:00 AM - 9:30 AM', name: 'Weekend Warrior', type: 'HIIT' },
      { day: 'Saturday', time: '10:00 AM - 11:00 AM', name: 'Family Fitness', type: 'Aerobics' }
    ];

    function renderSessions(c) {
      var sessions = Object.entries(allSessions).map(function(e) { return { id: e[0], data: e[1] }; });
      sessions.sort(function(a, b) { return (a.data.day || '').localeCompare(b.data.day || ''); });
      
      var html = '<div class="section"><div class="section-header"><h3><i class="fas fa-calendar-week"></i> Weekly Sessions (' + sessions.length + ')</h3><button class="add-btn" onclick="initSessions()">🔄 Reset Week</button></div>';
      
      if (sessions.length === 0) {
        html += '<div class="empty-state">No sessions. Tap "Reset Week" to create the standard schedule.</div>';
      } else {
        sessions.forEach(function(s) {
          var done = s.data.status === 'done';
          html += '<div class="session-card' + (done ? ' done' : '') + '">';
          html += '<div class="session-header"><strong>' + esc(s.data.name) + '</strong><span class="badge ' + (done ? 'active' : 'inactive') + '">' + (s.data.status || 'pending') + '</span></div>';
          html += '<div class="session-time">📅 ' + s.data.day + ' · ⏰ ' + s.data.time + ' · 🏷️ ' + s.data.type + '</div>';
          if (!done) {
            html += '<button class="add-btn" style="margin-top:0.5rem;font-size:0.6rem;" onclick="markDone(\'' + s.id + '\')">✅ Mark Done</button>';
          } else {
            html += '<small style="color:#065f46;">✔ Completed</small>';
          }
          html += '</div>';
        });
      }
      html += '</div>';
      c.innerHTML = html;
    }

    window.initSessions = function() {
      if (!confirm('Reset weekly sessions? This creates the standard 12-session weekly schedule.')) return;
      var promises = weeklySessions.map(function(s) {
        return db.ref('workfit_schedules').push({
          day: s.day, time: s.time, name: s.name, type: s.type,
          clubId: currentClubId, clubName: currentClubName,
          status: 'pending',
          createdAt: firebase.database.ServerValue.TIMESTAMP
        });
      });
      Promise.all(promises).then(function() {
        showToast('Weekly sessions created!');
      }).catch(function(e) {
        showToast('Error: ' + e.message, true);
      });
    };

    window.markDone = function(id) {
      db.ref('workfit_schedules/' + id).update({
        status: 'done',
        completedAt: firebase.database.ServerValue.TIMESTAMP
      }).then(function() {
        showToast('Session marked complete!');
      }).catch(function(e) {
        showToast('Error: ' + e.message, true);
      });
    };

    // === DOWNLOADS ===
    function renderDownloads(c) {
      var files = [
        { name: 'WorkFit Trainer Manual.pdf', icon: 'fa-file-pdf' },
        { name: 'Session Planning Template.xlsx', icon: 'fa-file-excel' },
        { name: 'Member Registration Form.pdf', icon: 'fa-file-pdf' },
        { name: 'Equipment Maintenance Log.docx', icon: 'fa-file-word' },
        { name: 'Weekly Schedule Template.pdf', icon: 'fa-file-pdf' }
      ];
      var html = '<div class="section"><div class="section-header"><h3><i class="fas fa-download"></i> Downloads</h3></div>';
      files.forEach(function(f) {
        html += '<div class="file-item"><div><i class="fas ' + f.icon + '" style="color:var(--orange);margin-right:8px;"></i> ' + f.name + '</div><button class="add-btn" style="font-size:0.6rem;" onclick="showToast(\'Download started (demo)\')"><i class="fas fa-download"></i></button></div>';
      });
      html += '</div>';
      c.innerHTML = html;
    }

    // === UPLOADS ===
    function renderUploads(c) {
      var html = '<div class="section"><div class="section-header"><h3><i class="fas fa-upload"></i> Upload Files</h3></div>';
      html += '<div class="file-upload" onclick="document.getElementById(\'fileInput\').click()"><i class="fas fa-cloud-upload-alt"></i><p style="font-size:0.75rem;">Tap to upload session reports, photos, or documents</p><input type="file" id="fileInput" style="display:none;" onchange="handleUpload(this)" multiple></div>';
      html += '<div id="uploadedFiles"><p style="font-size:0.65rem;color:var(--text-muted);">No files uploaded yet</p></div></div>';
      c.innerHTML = html;
    }

    window.handleUpload = function(input) {
      var files = input.files;
      if (!files.length) return;
      var html = '';
      for (var i = 0; i < files.length; i++) {
        html += '<div class="file-item"><span>📄 ' + files[i].name + '</span><span style="font-size:0.6rem;color:var(--text-muted);">' + (files[i].size / 1024).toFixed(1) + ' KB</span></div>';
      }
      document.getElementById('uploadedFiles').innerHTML = html;
      showToast(files.length + ' file(s) selected (demo)');
    };

    // Logout
    window.logout = function() {
      auth.signOut().then(function() {
        window.location.href = '/index.html';
      });
    };

    // Drawer
    document.getElementById('menuBtn').addEventListener('click', function() {
      document.getElementById('drawerOverlay').style.display = 'block';
      document.getElementById('drawer').classList.add('open');
    });
    document.getElementById('drawerClose').addEventListener('click', function() {
      document.getElementById('drawerOverlay').style.display = 'none';
      document.getElementById('drawer').classList.remove('open');
    });
    document.getElementById('drawerOverlay').addEventListener('click', function(e) {
      if (e.target === document.getElementById('drawerOverlay')) {
        document.getElementById('drawerOverlay').style.display = 'none';
        document.getElementById('drawer').classList.remove('open');
      }
    });

    // Auth
    auth.onAuthStateChanged(function(user) {
      if (!user) {
        window.location.href = '/index.html';
        return;
      }
      
      document.getElementById('drawerName').textContent = user.displayName || user.email.split('@')[0] || 'Trainer';
      document.getElementById('drawerEmail').textContent = user.email;
      document.getElementById('drawerAvatar').textContent = (user.displayName || user.email[0] || 'T').substring(0, 2).toUpperCase();

      findTrainerClub(user).then(function(assignment) {
        if (assignment && assignment.clubId) {
          currentClubId = assignment.clubId;
          currentClubName = assignment.clubName || 'Your Club';
          document.getElementById('trainerClubName').textContent = currentClubName;
          document.getElementById('clubInfo').textContent = 'Managing: ' + currentClubName;
          loadData();
        } else {
          currentClubId = null;
          document.getElementById('trainerClubName').textContent = 'No Club';
          document.getElementById('clubInfo').textContent = '⚠️ No club assigned. Contact admin.';
          document.getElementById('tabContent').innerHTML = '<div class="section"><div class="empty-state"><i class="fas fa-exclamation-triangle" style="font-size:2rem;color:var(--warning);display:block;margin-bottom:1rem;"></i><p><strong>No Club Assigned</strong></p><p style="margin-top:0.5rem;">Your account is not linked to any WorkFit club.</p><p style="margin-top:0.5rem;font-size:0.65rem;">Email: ' + user.email + '</p></div></div>';
          updateStats();
        }
      });
    });
  </script>
</body>
</html>
