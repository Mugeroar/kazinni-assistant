<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Heritage Marketplace · Dashboard</title>
  <meta name="theme-color" content="#d97706">
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --gold: #d97706; --gold-dark: #92400e; --gold-light: #fbbf24;
      --gold-bg: #fffbeb; --gold-border: #fde68a;
      --navy: #0f172a; --navy-light: #1e293b;
      --text: #1e293b; --text-muted: #64748b; --text-light: #94a3b8;
      --bg: #f8fafc; --white: #ffffff;
      --success: #10b981; --danger: #ef4444; --info: #3b82f6; --warning: #f59e0b;
      --border: #e2e8f0; --border-light: #f1f5f9;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
      --radius: 12px; --radius-lg: 16px; --radius-xl: 20px;
    }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      -webkit-font-smoothing: antialiased; overflow-x: hidden;
      padding-bottom: 70px;
    }

    /* ─── TOP NAV ─── */
    .topbar {
      background: var(--navy); color: white; padding: 0.5rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 3px solid var(--gold); position: sticky; top:0; z-index:100;
      gap: 0.5rem; min-height: 56px;
    }
    .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 0.9rem; text-decoration: none; cursor:pointer; flex-shrink:0; }
    .brand img { width: 30px; height: 30px; border-radius: 8px; background: white; padding: 2px; }
    .brand i { color: var(--gold); }
    .brand span { color: white; }
    .brand .gold { color: var(--gold); }

    .topbar-right { display: flex; align-items: center; gap: 6px; flex-shrink:0; }
    .user-menu { position: relative; }
    .user-btn {
      display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.08);
      padding: 0.15rem 0.6rem 0.15rem 0.15rem; border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-family: inherit;
      transition: all 0.2s; color: white;
    }
    .user-btn:active { transform: scale(0.95); }
    .user-btn .avatar {
      width: 28px; height: 28px; border-radius: 50%; background: var(--gold);
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.6rem;
      color: white; flex-shrink:0;
    }
    .user-btn .name { font-size: 0.7rem; max-width: 80px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-btn .chevron { font-size: 0.5rem; color: rgba(255,255,255,0.4); }

    .dropdown {
      position: absolute; top: 40px; right: 0; background: var(--white);
      border-radius: var(--radius-lg); min-width: 200px;
      box-shadow: var(--shadow-lg); border: 1px solid var(--border-light);
      opacity: 0; visibility: hidden; transform: translateY(-8px);
      transition: all 0.2s; z-index:200; overflow:hidden;
    }
    .dropdown.open { opacity: 1; visibility: visible; transform: translateY(0); }
    .dropdown-header {
      padding: 0.6rem 0.8rem; border-bottom: 1px solid var(--border-light);
      display: flex; align-items: center; gap: 8px;
    }
    .dropdown-avatar {
      width: 32px; height: 32px; border-radius: 50%; background: var(--gold);
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.7rem;
      color: white; flex-shrink:0;
    }
    .dropdown-info .name { font-weight: 700; font-size: 0.75rem; color: var(--text); }
    .dropdown-info .email { font-size: 0.6rem; color: var(--text-muted); }
    .dropdown-info .role { font-size: 0.55rem; color: var(--gold); font-weight: 600; }
    .dropdown-item {
      display: flex; align-items: center; gap: 8px; padding: 0.5rem 0.8rem;
      font-size: 0.7rem; color: var(--text-muted); cursor: pointer; border: none;
      background: none; width: 100%; font-family: inherit; text-align: left;
      transition: all 0.15s; text-decoration: none;
    }
    .dropdown-item:active { background: var(--gold-bg); }
    .dropdown-item i { width: 16px; text-align: center; color: var(--gold); font-size: 0.7rem; }
    .dropdown-divider { height: 1px; background: var(--border-light); margin: 0.2rem 0; }
    .dropdown-item.danger { color: var(--danger); }
    .dropdown-item.danger:active { background: #fef2f2; }
    .dropdown-item.danger i { color: var(--danger); }

    /* ─── MAIN ─── */
    .main { max-width: 1200px; margin: 0 auto; padding: 0.8rem 0.8rem 4rem; }

    .page-header {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.8rem;
    }
    .page-header h1 { font-size: 1.1rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .page-header h1 i { color: var(--gold); }
    .page-header .subtitle { font-size: 0.6rem; color: var(--text-muted); font-weight: 400; display: block; }

    /* ─── STATS ─── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 0.8rem;
    }
    .stat-card {
      background: var(--white); border-radius: var(--radius); padding: 0.7rem 0.8rem;
      border: 1px solid var(--gold-border); box-shadow: var(--shadow);
      transition: all 0.2s; cursor: default;
    }
    .stat-card:active { transform: scale(0.97); }
    .stat-card .num { font-size: 1.3rem; font-weight: 800; color: var(--gold-dark); line-height: 1.1; }
    .stat-card .label { font-size: 0.5rem; text-transform: uppercase; letter-spacing: 0.3px; color: var(--text-muted); margin-top: 1px; }
    .stat-card .icon { float: right; font-size: 1rem; color: var(--gold-light); opacity: 0.5; }

    /* ─── QUICK ACTIONS ─── */
    .quick-actions {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 0.8rem;
    }
    .quick-btn {
      background: var(--white); border: 1px solid var(--gold-border); border-radius: var(--radius);
      padding: 0.7rem 0.3rem; text-align: center; cursor: pointer;
      transition: all 0.2s; box-shadow: var(--shadow);
      font-family: inherit; color: var(--text);
    }
    .quick-btn:active { transform: scale(0.95); background: var(--gold-bg); }
    .quick-btn i { font-size: 1.2rem; color: var(--gold); display: block; margin-bottom: 4px; }
    .quick-btn span { font-size: 0.55rem; font-weight: 600; display: block; }

    /* ─── TABS ─── */
    .tab-nav {
      display: flex; gap: 4px; background: var(--white); border-radius: var(--radius);
      padding: 4px; margin-bottom: 0.8rem; border: 1px solid var(--border-light);
      box-shadow: var(--shadow); overflow-x: auto; flex-wrap: nowrap;
      -webkit-overflow-scrolling: touch;
    }
    .tab-btn {
      flex: 0 0 auto; padding: 0.4rem 0.7rem; border-radius: 8px; border: none;
      cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.6rem;
      font-weight: 600; background: transparent; color: var(--text-muted);
      transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 4px;
    }
    .tab-btn:active { transform: scale(0.95); }
    .tab-btn.active { background: var(--navy); color: white; box-shadow: 0 2px 8px rgba(15,23,42,0.15); }
    .tab-btn .badge {
      background: rgba(255,255,255,0.2); padding: 0 6px; border-radius: 8px;
      font-size: 0.5rem; font-weight: 700;
    }
    .tab-btn.active .badge { background: rgba(255,255,255,0.2); }

    .tab-content { display: none; animation: fadeIn 0.25s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

    /* ─── SECTION CARDS ─── */
    .section {
      background: var(--white); border-radius: var(--radius-lg);
      border: 1px solid var(--border-light); box-shadow: var(--shadow);
      margin-bottom: 0.8rem; overflow: hidden;
    }
    .section-header {
      padding: 0.6rem 0.8rem; border-bottom: 1px solid var(--border-light);
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.3rem;
    }
    .section-header h3 {
      font-size: 0.7rem; font-weight: 700; display: flex; align-items: center; gap: 6px;
    }
    .section-header h3 i { color: var(--gold); }
    .section-body { padding: 0.5rem 0.8rem; }
    .section-body.no-padding { padding: 0; }

    .btn {
      padding: 0.3rem 0.7rem; border-radius: 8px; border: none; font-weight: 700;
      font-size: 0.6rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 4px; font-family: inherit; transition: all 0.15s; white-space: nowrap;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary { background: var(--gold); color: white; }
    .btn-primary:active { background: var(--gold-dark); }
    .btn-secondary { background: var(--border-light); color: var(--text-muted); }
    .btn-sm { padding: 0.2rem 0.5rem; font-size: 0.55rem; }
    .btn-xs { padding: 0.15rem 0.4rem; font-size: 0.5rem; border-radius: 4px; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-success { background: var(--success); color: white; }

    /* ─── LIST ITEMS ─── */
    .list-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0.8rem; border-bottom: 1px solid var(--border-light);
      transition: background 0.15s; gap: 8px;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:active { background: var(--gold-bg); }
    .list-item-left { display: flex; align-items: center; gap: 8px; min-width:0; flex:1; }
    .list-item-icon {
      width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 0.7rem; flex-shrink:0;
      background: var(--gold-bg); color: var(--gold);
    }
    .list-item-info { min-width:0; }
    .list-item-title { font-weight: 600; font-size: 0.7rem; }
    .list-item-sub { font-size: 0.55rem; color: var(--text-muted); margin-top: 1px; }
    .list-item-right { display: flex; align-items: center; gap: 4px; flex-shrink:0; flex-wrap: wrap; }

    .badge {
      padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.5rem;
      font-weight: 600; text-transform: capitalize;
    }
    .badge-success { background: #ecfdf5; color: #065f46; }
    .badge-warning { background: #fffbeb; color: #92400e; }
    .badge-danger { background: #fef2f2; color: #991b1b; }
    .badge-info { background: #eff6ff; color: #1e40af; }
    .badge-neutral { background: var(--border-light); color: var(--text-muted); }

    .empty-state { text-align: center; padding: 1.5rem; color: var(--text-light); }
    .empty-state i { font-size: 1.5rem; display: block; margin-bottom: 0.4rem; opacity:0.4; }
    .empty-state p { font-size: 0.65rem; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed; inset:0; background: rgba(15,23,42,0.5);
      backdrop-filter: blur(4px); display: none; align-items: flex-end;
      justify-content: center; z-index:300;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--white); border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      padding: 1rem 1.2rem 1.5rem; width:100%; max-width:500px; max-height:85vh;
      overflow-y: auto; box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
      animation: modalUp 0.3s ease;
    }
    @keyframes modalUp { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin:0 auto 0.8rem; }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem;
    }
    .modal-header h3 { font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .modal-header h3 i { color: var(--gold); }
    .modal-close {
      width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border);
      background: var(--white); cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.2s; font-size:0.7rem;
    }
    .modal-close:active { background: #fef2f2; color: var(--danger); }

    .form-group { margin-bottom: 0.6rem; }
    .form-group label {
      display: block; font-weight: 600; font-size: 0.6rem;
      color: var(--text-muted); margin-bottom: 0.15rem; text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; padding:0.4rem 0.6rem; border:1.5px solid var(--border);
      border-radius:8px; font-family:'Inter',sans-serif; font-size:0.75rem;
      background:var(--bg); outline:none; transition:0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--gold); box-shadow:0 0 0 3px rgba(217,119,6,0.08);
      background: var(--white);
    }
    .form-row { display: grid; grid-template-columns:1fr 1fr; gap:0.6rem; }
    .form-actions { display: flex; gap: 6px; margin-top: 0.8rem; }
    .form-actions .btn { flex:1; justify-content:center; padding:0.4rem; }

    /* ─── TOAST ─── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      z-index: 400; padding: 0.5rem 1rem; border-radius: 10px;
      font-size: 0.65rem; font-weight: 600; box-shadow: var(--shadow-lg);
      background: var(--navy); color: white; display: none; max-width: 90%;
      animation: toastIn 0.3s ease;
    }
    .toast.error { background: var(--danger); }
    .toast.success { background: var(--success); }
    @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

    /* ─── BOTTOM NAV ─── */
    .bottom-nav {
      position: fixed; bottom:0; left:0; right:0; background: var(--white);
      border-top: 1px solid var(--border); display: flex; justify-content: space-around;
      padding: 0.3rem 0; z-index:99; box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
    }
    .bottom-nav .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 1px;
      background: none; border: none; padding: 0.2rem 0.5rem; cursor: pointer;
      font-family: inherit; color: var(--text-muted); transition: all 0.2s;
      min-width: 44px; min-height: 44px; justify-content: center;
    }
    .bottom-nav .nav-item:active { transform: scale(0.9); }
    .bottom-nav .nav-item i { font-size: 1rem; }
    .bottom-nav .nav-item span { font-size: 0.45rem; font-weight: 600; }
    .bottom-nav .nav-item.active { color: var(--gold); }

    @media (min-width: 640px) {
      .stats-grid { grid-template-columns: repeat(4, 1fr); }
      .quick-actions { grid-template-columns: repeat(5, 1fr); }
      .bottom-nav { display: none; }
      body { padding-bottom: 0; }
    }
    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .quick-actions { grid-template-columns: repeat(3, 1fr); }
      .form-row { grid-template-columns:1fr; }
      .page-header h1 { font-size: 0.95rem; }
      .modal { padding: 0.8rem 1rem 1.2rem; }
    }
    @media (max-width: 380px) {
      .quick-actions { grid-template-columns: repeat(2, 1fr); }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .user-btn .name { max-width: 50px; font-size: 0.6rem; }
      .brand span { font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <!-- ─── TOPBAR ─── -->
  <nav class="topbar">
    <div class="brand" onclick="switchTab('overview')">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="">
      <span><i class="fas fa-crown"></i> Heritage <span class="gold">Market</span></span>
    </div>
    <div class="topbar-right">
      <div class="user-menu" id="userMenu">
        <button class="user-btn" onclick="toggleDropdown()">
          <div class="avatar" id="userAvatar">HM</div>
          <span class="name" id="userName">Manager</span>
          <span class="chevron"><i class="fas fa-chevron-down"></i></span>
        </button>
        <div class="dropdown" id="dropdown">
          <div class="dropdown-header">
            <div class="dropdown-avatar" id="dropAvatar">HM</div>
            <div class="dropdown-info">
              <div class="name" id="dropName">Manager</div>
              <div class="email" id="dropEmail">user@example.com</div>
              <div class="role"><i class="fas fa-crown"></i> Admin</div>
            </div>
          </div>
          <button class="dropdown-item" onclick="switchTab('overview')"><i class="fas fa-chart-pie"></i> Dashboard</button>
          <button class="dropdown-item" onclick="switchTab('partners')"><i class="fas fa-handshake"></i> Partners</button>
          <button class="dropdown-item" onclick="switchTab('products')"><i class="fas fa-box"></i> Products</button>
          <button class="dropdown-item" onclick="switchTab('orders')"><i class="fas fa-shopping-cart"></i> Orders</button>
          <button class="dropdown-item" onclick="switchTab('catalogues')"><i class="fas fa-images"></i> Catalogues</button>
          <button class="dropdown-item" onclick="switchTab('listings')"><i class="fas fa-map-marked-alt"></i> Listings</button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item danger" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- ─── MAIN ─── -->
  <div class="main" id="mainContainer">

    <!-- ─── OVERVIEW TAB ─── -->
    <div class="tab-content active" id="tab-overview">
      <div class="page-header">
        <div><h1><i class="fas fa-store-alt"></i> Marketplace <span class="subtitle">Overview</span></h1></div>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="num" id="statPartners">0</div><div class="label">Partners</div><div class="icon"><i class="fas fa-handshake"></i></div></div>
        <div class="stat-card"><div class="num" id="statProducts">0</div><div class="label">Products</div><div class="icon"><i class="fas fa-box"></i></div></div>
        <div class="stat-card"><div class="num" id="statOrders">0</div><div class="label">Orders</div><div class="icon"><i class="fas fa-shopping-cart"></i></div></div>
        <div class="stat-card"><div class="num" id="statListings">0</div><div class="label">Listings</div><div class="icon"><i class="fas fa-map-pin"></i></div></div>
      </div>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <button class="quick-btn" onclick="openModal('partner')"><i class="fas fa-handshake"></i><span>Partner</span></button>
        <button class="quick-btn" onclick="openModal('product')"><i class="fas fa-box"></i><span>Product</span></button>
        <button class="quick-btn" onclick="openModal('order')"><i class="fas fa-shopping-cart"></i><span>Order</span></button>
        <button class="quick-btn" onclick="openModal('listing')"><i class="fas fa-map-pin"></i><span>Listing</span></button>
        <button class="quick-btn" onclick="openModal('catalogue')"><i class="fas fa-images"></i><span>Catalogue</span></button>
      </div>

      <!-- Recent Activity -->
      <div class="section">
        <div class="section-header"><h3><i class="fas fa-clock-rotate-left"></i> Recent Activity</h3></div>
        <div class="section-body no-padding" id="recentActivity">
          <div class="empty-state"><i class="fas fa-clock"></i><p>No recent activity</p></div>
        </div>
      </div>
    </div>

    <!-- ─── PARTNERS TAB ─── -->
    <div class="tab-content" id="tab-partners">
      <div class="page-header">
        <div><h1><i class="fas fa-handshake"></i> Partners <span class="subtitle" id="partnerCount">0</span></h1></div>
        <button class="btn btn-primary btn-sm" onclick="openModal('partner')"><i class="fas fa-plus"></i> Add</button>
      </div>
      <div class="section"><div class="section-body no-padding" id="partnerList"><div class="empty-state"><i class="fas fa-handshake"></i><p>Loading...</p></div></div></div>
    </div>

    <!-- ─── PRODUCTS TAB ─── -->
    <div class="tab-content" id="tab-products">
      <div class="page-header">
        <div><h1><i class="fas fa-box"></i> Products <span class="subtitle" id="productCount">0</span></h1></div>
        <button class="btn btn-primary btn-sm" onclick="openModal('product')"><i class="fas fa-plus"></i> Add</button>
      </div>
      <div class="section"><div class="section-body no-padding" id="productList"><div class="empty-state"><i class="fas fa-box-open"></i><p>Loading...</p></div></div></div>
    </div>

    <!-- ─── ORDERS TAB ─── -->
    <div class="tab-content" id="tab-orders">
      <div class="page-header">
        <div><h1><i class="fas fa-shopping-cart"></i> Orders <span class="subtitle" id="orderCount">0</span></h1></div>
        <button class="btn btn-primary btn-sm" onclick="openModal('order')"><i class="fas fa-plus"></i> Add</button>
      </div>
      <div class="section"><div class="section-body no-padding" id="orderList"><div class="empty-state"><i class="fas fa-shopping-bag"></i><p>Loading...</p></div></div></div>
    </div>

    <!-- ─── CATALOGUES TAB ─── -->
    <div class="tab-content" id="tab-catalogues">
      <div class="page-header">

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app"
    });

    const auth = firebase.auth();
    const db = firebase.database();

    let data = { partners: {}, products: {}, orders: {}, listings: {}, catalogues: {} };
    let currentTab = 'overview';
    let currentUser = null;

    const NODE_MAP = {
      partners: 'heritage_partners',
      products: 'heritage_products',
      orders: 'heritage_orders',
      listings: 'heritage_listings',
      catalogues: 'heritage_catalogues'
    };

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function toast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (type || '');
      t.style.display = 'block';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.style.display = 'none', 2800);
    }

    function toggleDropdown() {
      document.getElementById('dropdown').classList.toggle('open');
    }

    document.addEventListener('click', function(e) {
      const menu = document.getElementById('userMenu');
      if (menu && !menu.contains(e.target)) {
        document.getElementById('dropdown').classList.remove('open');
      }
    });

    function getInitials(name) {
      if (!name) return 'HM';
      return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
    }

    function getStatusClass(status) {
      const s = (status || 'pending').toLowerCase();
      const map = {
        'active': 'badge-success', 'inactive': 'badge-danger',
        'pending': 'badge-warning', 'confirmed': 'badge-info',
        'completed': 'badge-success', 'cancelled': 'badge-danger',
        'draft': 'badge-neutral', 'new': 'badge-warning'
      };
      return map[s] || 'badge-neutral';
    }

    function getPartnerName(id) {
      if (!id) return 'No Partner';
      const p = data.partners[id];
      return p ? (p.businessName || p.name || 'Partner') : id;
    }

    function getProductName(id) {
      if (!id) return 'No Product';
      const p = data.products[id];
      return p ? (p.name || 'Product') : id;
    }

    function timeAgo(ts) {
      if (!ts) return '';
      const d = typeof ts === 'number' ? new Date(ts) : new Date(ts);
      if (isNaN(d.getTime())) return '';
      const diff = Date.now() - d.getTime();
      const mins = Math.floor(diff / 60000);
      const hrs = Math.floor(mins / 60);
      const days = Math.floor(hrs / 24);
      if (days > 7) return d.toLocaleDateString();
      if (days > 0) return days + 'd ago';
      if (hrs > 0) return hrs + 'h ago';
      if (mins > 0) return mins + 'm ago';
      return 'Just now';
    }

    // ─── SWITCH TAB ───
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.querySelectorAll('.bottom-nav .nav-item').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      renderAll();
    }

    // ─── RENDER ───
    function renderAll() {
      updateStats();
      renderRecentActivity();
      renderPartners();
      renderProducts();
      renderOrders();
      renderListings();
      renderCatalogues();
    }

    function updateStats() {
      document.getElementById('statPartners').textContent = Object.keys(data.partners).length;
      document.getElementById('statProducts').textContent = Object.keys(data.products).length;
      document.getElementById('statOrders').textContent = Object.keys(data.orders).length;
      document.getElementById('statListings').textContent = Object.keys(data.listings).length;
      document.getElementById('partnerCount').textContent = Object.keys(data.partners).length;
      document.getElementById('productCount').textContent = Object.keys(data.products).length;
      document.getElementById('orderCount').textContent = Object.keys(data.orders).length;
      document.getElementById('catalogueCount').textContent = Object.keys(data.catalogues).length;
      document.getElementById('listingCount').textContent = Object.keys(data.listings).length;
    }

    function renderRecentActivity() {
      const container = document.getElementById('recentActivity');
      const all = [
        ...Object.entries(data.partners).map(([id,d]) => ({ id, ...d, _type: 'partner' })),

        ...Object.entries(data.listings).map(([id,d]) => ({ id, ...d, _type: 'listing' }))
      ].sort((a,b) => (b.updatedAt||b.createdAt||0) - (a.updatedAt||a.createdAt||0)).slice(0, 6);

      if (!all.length) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-clock"></i><p>No recent activity</p></div>';
        return;
      }

      const icons = { partner:'fa-handshake', order:'fa-shopping-cart', listing:'fa-map-pin' };
      const labels = { partner:'Partner', order:'Order', listing:'Listing' };

      container.innerHTML = all.map(item => {
        const name = item.businessName || item.name || item.customerName || 'Item';
        return `
          <div class="list-item" onclick="switchTab('${item._type}s')">
            <div class="list-item-left">
              <div class="list-item-icon"><i class="fas ${icons[item._type]||'fa-clock'}"></i></div>
              <div class="list-item-info">
                <div class="list-item-title">${esc(name)}</div>
                <div class="list-item-sub">${labels[item._type]||''} · ${timeAgo(item.createdAt)}</div>
              </div>
            </div>
            <div class="list-item-right">
              <span class="badge ${getStatusClass(item.status)}">${item.status||'new'}</span>
            </div>
          </div>`;
      }).join('');
    }

    function renderPartners() {
      const container = document.getElementById('partnerList');

        return;

    function renderProducts() {
      const container = document.getElementById('productList');

        <div class="list-item">

      `).join('');
    }

    function renderOrders() {
      const container = document.getElementById('orderList');

        container.innerHTML = '<div class="empty-state"><i class="fas fa-shopping-bag"></i><p>No orders</p></div>';

      container.innerHTML = items.map(o => `

            <button class="btn btn-sm" style="color:var(--danger);" onclick="deleteItem('orders','${o.id}')"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      `).join('');
    }

    function renderListings() {
      const container = document.getElementById('listingList');

        container.innerHTML = '<div class="empty-state"><i class="fas fa-map"></i><p>No listings</p></div>';

      container.innerHTML = items.map(l => `

    // ─── DELETE ───
    window.deleteItem = async function(type, id) {
      if (!confirm('Delete this item?')) return;
      const node = NODE_MAP[type];
      try {
        await db.ref(node + '/' + id).remove();
        toast('✅ Deleted', 'success');
      } catch (e) {
        toast('❌ Error: ' + e.message, 'error');
      }
    };

    // ─── MODAL ───
    window.openModal = function(type, id) {
      const isEdit = !!id;
      const item = isEdit ? data[type][id] : null;
      const title = isEdit ? 'Edit ' + type.charAt(0).toUpperCase() + type.slice(1) : 'Add ' + type.charAt(0).toUpperCase() + type.slice(1);

      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = getModalForm(type, item, isEdit);
      document.getElementById('modalOverlay').classList.add('active');
    };

      const common = `

        <input type="hidden" id="editId" value="${isEdit ? item.id : ''}">

      const forms = {
        partner: `

          </div>
          <div class="form-row">
            <div class="form-group"><label>Phone</label><input type="text" id="fPhone" value="${esc(item?.phone||'')}" placeholder="+254..."></div>
            <div class="form-group"><label>Email</label><input type="email" id="fEmail" value="${esc(item?.email||'')}" placeholder="partner@email.com"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Industry</label><select id="fIndustry"><option value="Fashion" ${item?.industry==='Fashion'?'selected':''}>Fashion</option><option value="Food" ${item?.industry==='Food'?'selected':''}>Food</option><option value="Electronics" ${item?.industry==='Electronics'?'selected':''}>Electronics</option><option value="Home Goods" ${item?.industry==='Home Goods'?'selected':''}>Home Goods</option><option value="Beauty" ${item?.industry==='Beauty'?'selected':''}>Beauty</option><option value="Agriculture" ${item?.industry==='Agriculture'?'selected':''}>Agriculture</option><option value="Other" ${item?.industry==='Other'?'selected':''}>Other</option></select></div>
            <div class="form-group"><label>Tier</label><select id="fTier"><option value="standard" ${item?.tier==='standard'?'selected':''}>Standard</option><option value="premium" ${item?.tier==='premium'?'selected':''}>⭐ Premium</option></select></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Location</label><input type="text" id="fLocation" value="${esc(item?.location||'')}" placeholder="City/Area"></div>
            <div class="form-group"><label>Status</label><select id="fStatus"><option value="active" ${item?.status==='active'?'selected':''}>Active</option><option value="inactive" ${item?.status==='inactive'?'selected':''}>Inactive</option></select></div>
          </div>
          <div class="form-group"><label>Notes</label><textarea id="fNotes" rows="2">${esc(item?.notes||'')}</textarea></div>
        `,
        product: `
          ${common}
          <div class="form-group"><label>Product Name *</label><input type="text" id="fName" value="${esc(item?.name||'')}" placeholder="Product name"></div>
          <div class="form-row">
            <div class="form-group"><label>Price (KES)</label><input type="number" id="fPrice" value="${item?.price||0}"></div>

          </div>
          <div class="form-row">
            <div class="form-group"><label>Partner</label><select id="fPartner"><option value="">None</option>${Object.entries(data.partners).map(([pid,p]) => `<option value="${pid}" ${item?.partnerId===pid?'selected':''}>${esc(p.businessName||p.name||pid)}</option>`).join('')}</select></div>
            <div class="form-group"><label>Status</label><select id="fStatus"><option value="active" ${item?.isActive!==false?'selected':''}>Active</option><option value="inactive" ${item?.isActive===false?'selected':''}>Inactive</option></select></div>
          </div>
          <div class="form-group"><label>Description</label><textarea id="fNotes" rows="2">${esc(item?.description||'')}</textarea></div>
        `,
        order: `

            <div class="form-group"><label>Product</label><select id="fPartner"><option value="">Select</option>${Object.entries(data.products).map(([pid,p]) => `<option value="${pid}" ${item?.productId===pid?'selected':''}>${esc(p.name)} (KES ${p.price||0})</option>`).join('')}</select></div>

            <div class="form-group"><label>Quantity</label><input type="number" id="fStock" value="${item?.quantity||1}"></div>

    window.saveModal = async function() {
      const type = document.getElementById('editType').value;
      const id = document.getElementById('editId').value;
      const name = document.getElementById('fName')?.value?.trim() || '';

      if (!name && type !== 'order') { toast('Name is required', 'error'); return; }

      let dataObj = { updatedAt: Date.now() };

      switch(type) {
        case 'partner':
          dataObj = { ...dataObj, businessName: name, name, contactPerson: document.getElementById('fContact')?.value||'', phone: document.getElementById('fPhone')?.value||'', email: document.getElementById('fEmail')?.value||'', industry: document.getElementById('fIndustry')?.value||'Other', tier: document.getElementById('fTier')?.value||'standard', location: document.getElementById('fLocation')?.value||'', status: document.getElementById('fStatus')?.value||'active', notes: document.getElementById('fNotes')?.value||'' };
          if (!id) dataObj.createdAt = Date.now();
          break;
        case 'product':
          dataObj = { ...dataObj, name, partnerId: document.getElementById('fPartner')?.value||'', price: Number(document.getElementById('fPrice')?.value)||0, stock: Number(document.getElementById('fStock')?.value)||0, isActive: document.getElementById('fStatus')?.value !== 'inactive', description: document.getElementById('fNotes')?.value||'' };
          if (!id) dataObj.createdAt = Date.now();
          break;
        case 'order':
          const pid = document.getElementById('fPartner')?.value||'';
          const prod = data.products[pid];
          dataObj = { ...dataObj, customerName: name, customerPhone: document.getElementById('fPhone')?.value||'', productId: pid, productName: prod?.name||'', quantity: Number(document.getElementById('fStock')?.value)||1, total: Number(document.getElementById('fPrice')?.value)||0, status: document.getElementById('fStatus')?.value||'pending', customerLocation: document.getElementById('fNotes')?.value||'' };
          if (!id) dataObj.createdAt = Date.now();
          break;
        case 'listing':
          dataObj = { ...dataObj, businessName: name, name, location: document.getElementById('fNotes')?.value||'', adType: document.getElementById('fStatus')?.value||'Other', occupiedBy: document.getElementById('fContact')?.value||'', partnerName: document.getElementById('fContact')?.value||'', status: 'active' };
          if (!id) dataObj.createdAt = Date.now();
          break;
        case 'catalogue':
          dataObj = { ...dataObj, name, partnerId: document.getElementById('fPartner')?.value||'', status: document.getElementById('fStatus')?.value||'draft', coverImage: document.getElementById('fNotes')?.value||'', productIds: [] };
          if (!id) dataObj.createdAt = Date.now();
          break;
      }

      const node = NODE_MAP[type];
      try {
        if (id) { await db.ref(node + '/' + id).update(dataObj); toast('✅ Updated', 'success'); }
        else { await db.ref(node).push(dataObj); toast('✅ Created', 'success'); }
        closeModal();
      } catch (e) { toast('❌ Error: ' + e.message, 'error'); }
    };

    window.closeModal = function() {
      document.getElementById('modalOverlay').classList.remove('active');
    };

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    // ─── LOGOUT ───
    window.handleLogout = async function() {
      try { await auth.signOut(); window.location.href = '/workspaces/index.html'; }
      catch(e) { toast('Error signing out', 'error'); }
    };

    // ─── FIREBASE LISTENERS ───
    const keys = ['partners', 'products', 'orders', 'listings', 'catalogues'];
    keys.forEach(key => {
      const node = NODE_MAP[key];
      db.ref(node).on('value', snap => {
        data[key] = snap.val() || {};
        renderAll();
      }, err => {
        console.error('Error loading ' + key + ':', err);
        toast('Error loading data', 'error');
      });
    });

    // ─── AUTH ───
    auth.onAuthStateChanged(user => {
      if (!user) { window.location.href = '/workspaces/index.html'; return; }
      currentUser = user;
      const name = user.displayName || user.email?.split('@')[0] || 'Manager';
      const initial = getInitials(name);
      document.getElementById('userName').textContent = name;
      document.getElementById('userAvatar').textContent = initial;
      document.getElementById('dropName').textContent = name;
      document.getElementById('dropAvatar').textContent = initial;
      document.getElementById('dropEmail').textContent = user.email || '';
    });

    // ─── EXPOSE ───
    window.switchTab = switchTab;
    window.openModal = openModal;
    window.closeModal = closeModal;
    window.saveModal = saveModal;
    window.toggleDropdown = toggleDropdown;
    window.deleteItem = deleteItem;
    window.handleLogout = handleLogout;
  </script>
</body>
</html>
