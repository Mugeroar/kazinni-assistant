<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Heritage Marketplace · Full Access</title>
  <meta name="theme-color" content="#d97706">
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --amber: #d97706; --amber-dark: #92400e; --amber-light: #fbbf24;
      --navy: #0f172a; --text-primary: #1e293b; --text-muted: #64748b;
      --border: #e2e8f0; --border-light: #f1f5f9;
      --success: #10b981; --danger: #ef4444; --info: #3b82f6;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --radius: 12px; --radius-lg: 16px; --radius-xl: 20px;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8fafc; color: var(--text-primary); min-height: 100vh;
    }
    /* Topbar */
    .topbar {
      background: var(--navy); color: white; padding: 0 1.5rem; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 2px solid var(--amber); position: sticky; top:0; z-index:100;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1rem; }
    .brand img { width: 32px; height: 32px; border-radius: 8px; background: white; }
    .brand i { color: var(--amber); }
    .topbar-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .user-badge { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 0.3rem 0.9rem; border-radius: 30px; font-size: 0.75rem; }
    .user-badge .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--amber); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.7rem; }
    .btn { padding: 0.4rem 0.9rem; border-radius: 8px; font-weight: 600; font-size: 0.7rem; border: none; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; }
    .btn-gold { background: var(--amber); color: white; }
    .btn-gold:hover { background: #a16207; }
    .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; }
    .btn-outline:hover { background: rgba(255,255,255,0.1); }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.65rem; }
    .btn-xs { padding: 0.2rem 0.5rem; font-size: 0.6rem; border-radius: 6px; }
    .btn-primary { background: var(--info); color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #059669; }

    .main { max-width: 1200px; margin: 0 auto; padding: 1.2rem; }
    .page-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1.2rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .page-header h1 i { color: var(--amber); }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 1.2rem; }
    .stat-card {
      background: white; border-radius: var(--radius); padding: 0.8rem 1rem;
      border: 1px solid var(--border-light); box-shadow: var(--shadow);
      text-align: center; transition: all 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .stat-card .num { font-size: 1.5rem; font-weight: 800; color: var(--amber-dark); }
    .stat-card .label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.3px; color: var(--text-muted); }

    /* Tabs */
    .tab-nav {
      display: flex; gap: 4px; background: white; border-radius: var(--radius);
      padding: 4px; margin-bottom: 1.2rem; border: 1px solid var(--border-light);
      box-shadow: var(--shadow); overflow-x: auto; flex-wrap: nowrap;
    }
    .tab-btn {
      flex: 0 0 auto; padding: 0.5rem 1rem; border-radius: 10px; border: none;
      cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.7rem;
      font-weight: 600; background: transparent; color: var(--text-muted);
      transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 6px;
    }
    .tab-btn:hover { background: #f8fafc; color: var(--text-primary); }
    .tab-btn.active { background: var(--navy); color: white; box-shadow: 0 2px 8px rgba(15,23,42,0.15); }
    .tab-btn .badge { background: rgba(255,255,255,0.2); padding: 0 7px; border-radius: 10px; font-size: 0.6rem; }
    .tab-btn.active .badge { background: rgba(255,255,255,0.25); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Cards */
    .section { background: white; border-radius: var(--radius-lg); border: 1px solid var(--border-light); box-shadow: var(--shadow); margin-bottom: 1.2rem; overflow: hidden; }
    .section-header { padding: 0.8rem 1.2rem; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.4rem; }
    .section-header h3 { font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .section-body { padding: 0.8rem 1.2rem; }
    .section-body.no-padding { padding: 0; }

    .list-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 1.2rem; border-bottom: 1px solid var(--border-light);
      transition: background 0.1s;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: #f8fafc; }
    .list-item-left { display: flex; align-items: center; gap: 10px; min-width:0; }
    .list-item-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; background: #fffbeb; color: var(--amber); }
    .list-item-info { min-width:0; }
    .list-item-title { font-weight: 600; font-size: 0.78rem; }
    .list-item-sub { font-size: 0.62rem; color: var(--text-muted); margin-top:1px; }
    .list-item-right { display: flex; align-items: center; gap: 6px; flex-shrink:0; flex-wrap: wrap; }

    .badge { padding: 0.15rem 0.5rem; border-radius: 6px; font-size: 0.6rem; font-weight: 600; text-transform: capitalize; }
    .badge-success { background: #ecfdf5; color: #065f46; }
    .badge-warning { background: #fffbeb; color: #92400e; }
    .badge-danger { background: #fef2f2; color: #991b1b; }
    .badge-info { background: #eff6ff; color: #1e40af; }
    .badge-neutral { background: #f1f5f9; color: #475569; }

    .empty-state { text-align: center; padding: 2.5rem 1rem; }
    .empty-state i { font-size: 2.5rem; color: #cbd5e1; display: block; margin-bottom: 0.5rem; }
    .empty-state p { font-size: 0.78rem; color: var(--text-muted); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset:0; background: rgba(15,23,42,0.4); backdrop-filter: blur(4px);
      display: none; align-items: flex-end; justify-content: center; z-index:300;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white; border-radius: 20px 20px 0 0; padding: 1.5rem;
      width:100%; max-width:560px; max-height:85vh; overflow-y:auto;
      box-shadow: 0 -4px 30px rgba(0,0,0,0.1);
    }
    .modal-handle { width: 36px; height: 4px; background: #e2e8f0; border-radius: 2px; margin:0 auto 1rem; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .modal-header h3 { font-size: 1rem; font-weight: 700; }
    .modal-close { width: 30px; height: 30px; border-radius: 50%; border:1px solid var(--border); background:white; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .form-group { margin-bottom: 0.8rem; }
    .form-group label { display: block; font-weight:600; font-size:0.7rem; color:var(--text-muted); margin-bottom:0.2rem; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; padding:0.5rem 0.7rem; border:1px solid var(--border);
      border-radius:8px; font-family:'Inter',sans-serif; font-size:0.8rem;
      background:#f8fafc; outline:none; transition:0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--amber); box-shadow:0 0 0 3px rgba(202,138,4,0.08); background:white;
    }
    .form-row { display: grid; grid-template-columns:1fr 1fr; gap:0.8rem; }

    .toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
      z-index:400; padding:0.6rem 1.4rem; border-radius:12px; font-size:0.75rem;
      font-weight:600; box-shadow:var(--shadow-md); background:#0f172a; color:white;
      display:none;
    }
    .toast.error { background:#991b1b; }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .form-row { grid-template-columns:1fr; }
      .topbar { padding:0 1rem; height:auto; gap:0.5rem; flex-wrap:wrap; }
    }
    @media (max-width: 500px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .tab-btn { font-size:0.6rem; padding:0.3rem 0.6rem; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand"><img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt=""><i class="fas fa-crown"></i> Heritage</div>
    <div class="topbar-right">
      <div class="user-badge"><div class="avatar" id="userAvatar">HM</div><span id="userName">Manager</span></div>
      <button class="btn btn-outline btn-sm" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>

  <div class="main">
    <div class="page-header">
      <h1><i class="fas fa-store-alt"></i> Heritage Marketplace</h1>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn btn-gold btn-sm" onclick="openModal('partner')"><i class="fas fa-handshake"></i> Add Partner</button>
        <button class="btn btn-gold btn-sm" onclick="openModal('product')"><i class="fas fa-box"></i> Add Product</button>
        <button class="btn btn-gold btn-sm" onclick="openModal('order')"><i class="fas fa-shopping-cart"></i> Add Order</button>
        <button class="btn btn-gold btn-sm" onclick="openModal('listing')"><i class="fas fa-map-pin"></i> Register</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="num" id="statPartners">0</div><div class="label">Partners</div></div>
      <div class="stat-card"><div class="num" id="statProducts">0</div><div class="label">Products</div></div>
      <div class="stat-card"><div class="num" id="statOrders">0</div><div class="label">Orders</div></div>
      <div class="stat-card"><div class="num" id="statListings">0</div><div class="label">Listings</div></div>
      <div class="stat-card"><div class="num" id="statCatalogues">0</div><div class="label">Catalogues</div></div>
    </div>

    <!-- Tabs -->
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="overview"><i class="fas fa-chart-pie"></i> Overview</button>
      <button class="tab-btn" data-tab="partners"><i class="fas fa-handshake"></i> Partners</button>
      <button class="tab-btn" data-tab="products"><i class="fas fa-box"></i> Products</button>
      <button class="tab-btn" data-tab="orders"><i class="fas fa-shopping-cart"></i> Orders</button>
      <button class="tab-btn" data-tab="listings"><i class="fas fa-map-marked-alt"></i> Listings</button>
      <button class="tab-btn" data-tab="catalogues"><i class="fas fa-images"></i> Catalogues</button>
    </div>

    <!-- TAB: Overview -->
    <div class="tab-content active" id="tab-overview">
      <div class="section">
        <div class="section-header"><h3><i class="fas fa-clock-rotate-left"></i> Recent Activity</h3></div>
        <div class="section-body no-padding" id="recentActivity">
          <div class="empty-state"><i class="fas fa-clock"></i><p>No recent activity</p></div>
        </div>
      </div>
    </div>

    <!-- TAB: Partners -->
    <div class="tab-content" id="tab-partners">
      <div class="section">
        <div class="section-header"><h3><i class="fas fa-handshake"></i> Business Partners</h3></div>
        <div class="section-body no-padding" id="partnerList"></div>
      </div>
    </div>

    <!-- TAB: Products -->
    <div class="tab-content" id="tab-products">
      <div class="section">
        <div class="section-header"><h3><i class="fas fa-box"></i> Product Catalogue</h3></div>
        <div class="section-body no-padding" id="productList"></div>
      </div>
    </div>

    <!-- TAB: Orders -->
    <div class="tab-content" id="tab-orders">
      <div class="section">
        <div class="section-header"><h3><i class="fas fa-shopping-cart"></i> Orders</h3></div>
        <div class="section-body no-padding" id="orderList"></div>
      </div>
    </div>

    <!-- TAB: Listings -->
    <div class="tab-content" id="tab-listings">
      <div class="section">
        <div class="section-header"><h3><i class="fas fa-map-marked-alt"></i> Business Listings</h3></div>
        <div class="section-body no-padding" id="listingList"></div>
      </div>
    </div>

    <!-- TAB: Catalogues -->
    <div class="tab-content" id="tab-catalogues">
      <div class="section">
        <div class="section-header"><h3><i class="fas fa-images"></i> Partner Catalogues</h3></div>
        <div class="section-body no-padding" id="catalogueList"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"><div class="modal-handle"></div></div></div>
  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc"
    });
    const auth = firebase.auth(); const db = firebase.database();

    let allPartners = {}, allProducts = {}, allOrders = {}, allListings = {}, allCatalogues = {};
    let currentTab = 'overview';

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function toast(msg, err) { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast'+(err?' error':''); t.style.display='block'; clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none', 2800); }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
        this.classList.add('active');
        const tab = this.dataset.tab;
        document.getElementById('tab-'+tab).classList.add('active');
        currentTab = tab;
        renderAll();
      });
    });

    function renderAll() {
      updateStats();
      renderPartners();
      renderProducts();
      renderOrders();
      renderListings();
      renderCatalogues();
      renderRecentActivity();
    }

    function updateStats() {
      document.getElementById('statPartners').textContent = Object.keys(allPartners).length;
      document.getElementById('statProducts').textContent = Object.keys(allProducts).length;
      document.getElementById('statOrders').textContent = Object.keys(allOrders).length;
      document.getElementById('statListings').textContent = Object.keys(allListings).length;
      document.getElementById('statCatalogues').textContent = Object.keys(allCatalogues).length;
    }

    function renderRecentActivity() {
      const container = document.getElementById('recentActivity');
      const all = [
        ...Object.entries(allPartners).map(([id,d])=>({id,...d,type:'partner'})),
        ...Object.entries(allOrders).map(([id,d])=>({id,...d,type:'order'})),
        ...Object.entries(allListings).map(([id,d])=>({id,...d,type:'listing'}))
      ].sort((a,b)=>(b.updatedAt||b.createdAt||0)-(a.updatedAt||a.createdAt||0)).slice(0, 8);

      if(!all.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-clock"></i><p>No recent activity</p></div>'; return; }

      container.innerHTML = all.map(item => {
        const icons = { partner:'fa-handshake', order:'fa-shopping-cart', listing:'fa-map-pin' };
        const labels = { partner:'Partner', order:'Order', listing:'Listing' };
        const name = item.businessName || item.name || item.customerName || 'Item';
        return `<div class="list-item"><div class="list-item-left"><div class="list-item-icon"><i class="fas ${icons[item.type]||'fa-clock'}"></i></div><div class="list-item-info"><div class="list-item-title">${esc(name)}</div><div class="list-item-sub">${labels[item.type]} · ${new Date(item.createdAt||Date.now()).toLocaleDateString()}</div></div></div><div class="list-item-right"><span class="badge ${item.status==='active'||item.status==='completed'?'badge-success':'badge-warning'}">${item.status||'new'}</span></div></div>`;
      }).join('');
    }

    function renderPartners() {
      const container = document.getElementById('partnerList');
      const items = Object.entries(allPartners).map(([id,d])=>({id,...d}));
      if(!items.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-handshake"></i><p>No partners</p></div>'; return; }
      container.innerHTML = items.map(p => `
        <div class="list-item">
          <div class="list-item-left"><div class="list-item-icon"><i class="fas fa-building"></i></div><div class="list-item-info"><div class="list-item-title">${esc(p.businessName||p.name||'Partner')}</div><div class="list-item-sub">${esc(p.contactPerson||'')} · ${p.phone||''}</div></div></div>
          <div class="list-item-right"><span class="badge ${p.status==='active'?'badge-success':'badge-neutral'}">${p.status||'active'}</span><button class="btn btn-outline btn-xs" onclick="editItem('partner','${p.id}')"><i class="fas fa-pen"></i></button><button class="btn btn-outline btn-xs" style="color:#ef4444;" onclick="deleteItem('heritage_partners','${p.id}')"><i class="fas fa-trash"></i></button></div>
        </div>
      `).join('');
    }

    function renderProducts() {
      const container = document.getElementById('productList');
      const items = Object.entries(allProducts).map(([id,d])=>({id,...d}));
      if(!items.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i><p>No products</p></div>'; return; }
      container.innerHTML = items.map(p => {
        const partner = allPartners[p.partnerId];
        return `<div class="list-item">
          <div class="list-item-left"><div class="list-item-icon">📦</div><div class="list-item-info"><div class="list-item-title">${esc(p.name)}</div><div class="list-item-sub">${partner ? esc(partner.businessName||partner.name) : 'No partner'} · KES ${p.price||0} · Stock: ${p.stock||0}</div></div></div>
          <div class="list-item-right"><span class="badge ${p.isActive!==false?'badge-success':'badge-neutral'}">${p.isActive!==false?'active':'inactive'}</span><button class="btn btn-outline btn-xs" onclick="editItem('product','${p.id}')"><i class="fas fa-pen"></i></button><button class="btn btn-outline btn-xs" style="color:#ef4444;" onclick="deleteItem('heritage_products','${p.id}')"><i class="fas fa-trash"></i></button></div>
        </div>`;
      }).join('');
    }

    function renderOrders() {
      const container = document.getElementById('orderList');
      const items = Object.entries(allOrders).map(([id,d])=>({id,...d})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
      if(!items.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-shopping-bag"></i><p>No orders</p></div>'; return; }
      container.innerHTML = items.map(o => `
        <div class="list-item">
          <div class="list-item-left"><div class="list-item-icon">🛒</div><div class="list-item-info"><div class="list-item-title">${esc(o.customerName||'Guest')}</div><div class="list-item-sub">${esc(o.productName||'')} × ${o.quantity||1} · KES ${o.total||0}</div></div></div>
          <div class="list-item-right"><span class="badge ${o.status==='completed'?'badge-success':o.status==='cancelled'?'badge-danger':'badge-warning'}">${o.status||'pending'}</span><button class="btn btn-outline btn-xs" onclick="editItem('order','${o.id}')"><i class="fas fa-pen"></i></button><button class="btn btn-outline btn-xs" style="color:#ef4444;" onclick="deleteItem('heritage_orders','${o.id}')"><i class="fas fa-trash"></i></button></div>
        </div>
      `).join('');
    }

    function renderListings() {
      const container = document.getElementById('listingList');
      const items = Object.entries(allListings).map(([id,d])=>({id,...d}));
      if(!items.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-map"></i><p>No listings</p></div>'; return; }
      container.innerHTML = items.map(l => `
        <div class="list-item">
          <div class="list-item-left"><div class="list-item-icon"><i class="fas fa-store"></i></div><div class="list-item-info"><div class="list-item-title">${esc(l.businessName||l.name||'Business')}</div><div class="list-item-sub">${esc(l.location||'')} · ${l.adType||'Standard'}</div></div></div>
          <div class="list-item-right"><span class="badge ${l.status==='active'?'badge-success':'badge-neutral'}">${l.status||'active'}</span><button class="btn btn-outline btn-xs" onclick="editItem('listing','${l.id}')"><i class="fas fa-pen"></i></button><button class="btn btn-outline btn-xs" style="color:#ef4444;" onclick="deleteItem('heritage_listings','${l.id}')"><i class="fas fa-trash"></i></button></div>
        </div>
      `).join('');
    }

    function renderCatalogues() {
      const container = document.getElementById('catalogueList');
      const items = Object.entries(allCatalogues).map(([id,d])=>({id,...d}));
      if(!items.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-images"></i><p>No catalogues</p></div>'; return; }
      container.innerHTML = items.map(c => {
        const partner = allPartners[c.partnerId];
        return `<div class="list-item">
          <div class="list-item-left"><div class="list-item-icon"><i class="fas fa-folder"></i></div><div class="list-item-info"><div class="list-item-title">${esc(c.name||'Catalogue')}</div><div class="list-item-sub">${partner ? esc(partner.businessName||partner.name) : 'No partner'} · ${(c.productIds||[]).length} products</div></div></div>
          <div class="list-item-right"><span class="badge ${c.status==='active'?'badge-success':'badge-neutral'}">${c.status||'draft'}</span><button class="btn btn-outline btn-xs" onclick="editItem('catalogue','${c.id}')"><i class="fas fa-pen"></i></button><button class="btn btn-outline btn-xs" style="color:#ef4444;" onclick="deleteItem('heritage_catalogues','${c.id}')"><i class="fas fa-trash"></i></button></div>
        </div>`;
      }).join('');
    }

    // Modal system
    window.openModal = function(type, id) {
      const item = id ? getItem(type, id) : null;
      let html = `<div class="modal-handle"></div><div class="modal-header"><h3>${id?'Edit':'Add'} ${type.charAt(0).toUpperCase()+type.slice(1)}</h3><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div><input type="hidden" id="editType" value="${type}"><input type="hidden" id="editId" value="${id||''}">`;

      switch(type) {
        case 'partner':
          html += `<div class="form-group"><label>Business Name *</label><input id="fName" value="${esc(item?.businessName||item?.name||'')}"></div>
            <div class="form-row"><div class="form-group"><label>Contact Person</label><input id="fContact" value="${esc(item?.contactPerson||'')}"></div><div class="form-group"><label>Phone</label><input id="fPhone" value="${esc(item?.phone||'')}"></div></div>
            <div class="form-row"><div class="form-group"><label>Email</label><input id="fEmail" value="${esc(item?.email||'')}"></div><div class="form-group"><label>Status</label><select id="fStatus"><option value="active" ${item?.status==='active'?'selected':''}>Active</option><option value="inactive" ${item?.status==='inactive'?'selected':''}>Inactive</option></select></div></div>
            <div class="form-group"><label>Notes</label><textarea id="fNotes" rows="2">${esc(item?.notes||'')}</textarea></div>`;
          break;
        case 'product':
          const partnerOpts = Object.entries(allPartners).map(([pid,p]) => `<option value="${pid}" ${item?.partnerId===pid?'selected':''}>${esc(p.businessName||p.name||pid)}</option>`).join('');
          html += `<div class="form-group"><label>Product Name *</label><input id="fName" value="${esc(item?.name||'')}"></div>
            <div class="form-row"><div class="form-group"><label>Price (KES)</label><input id="fPrice" type="number" value="${item?.price||0}"></div><div class="form-group"><label>Stock</label><input id="fStock" type="number" value="${item?.stock||0}"></div></div>
            <div class="form-row"><div class="form-group"><label>Partner</label><select id="fPartner"><option value="">None</option>${partnerOpts}</select></div><div class="form-group"><label>Status</label><select id="fStatus"><option value="active" ${item?.isActive!==false?'selected':''}>Active</option><option value="inactive" ${item?.isActive===false?'selected':''}>Inactive</option></select></div></div>
            <div class="form-group"><label>Description</label><textarea id="fNotes" rows="2">${esc(item?.description||'')}</textarea></div>`;
          break;
        case 'order':
          const prodOpts = Object.entries(allProducts).map(([pid,p]) => `<option value="${pid}" ${item?.productId===pid?'selected':''}>${esc(p.name)} (KES ${p.price||0})</option>`).join('');
          html += `<div class="form-group"><label>Customer Name *</label><input id="fName" value="${esc(item?.customerName||'')}"></div>
            <div class="form-row"><div class="form-group"><label>Phone</label><input id="fPhone" value="${esc(item?.customerPhone||'')}"></div><div class="form-group"><label>Product</label><select id="fPartner"><option value="">Select</option>${prodOpts}</select></div></div>
            <div class="form-row"><div class="form-group"><label>Quantity</label><input id="fStock" type="number" value="${item?.quantity||1}"></div><div class="form-group"><label>Total (KES)</label><input id="fPrice" type="number" value="${item?.total||0}"></div></div>
            <div class="form-row"><div class="form-group"><label>Status</label><select id="fStatus"><option value="pending" ${item?.status==='pending'?'selected':''}>Pending</option><option value="confirmed" ${item?.status==='confirmed'?'selected':''}>Confirmed</option><option value="completed" ${item?.status==='completed'?'selected':''}>Completed</option><option value="cancelled" ${item?.status==='cancelled'?'selected':''}>Cancelled</option></select></div><div class="form-group"><label>Location</label><input id="fNotes" value="${esc(item?.customerLocation||'')}"></div></div>`;
          break;
        case 'listing':
          html += `<div class="form-group"><label>Business Name *</label><input id="fName" value="${esc(item?.businessName||item?.name||'')}"></div>
            <div class="form-row"><div class="form-group"><label>Location</label><input id="fNotes" value="${esc(item?.location||'')}"></div><div class="form-group"><label>Ad Type</label><select id="fStatus"><option value="Facebook Ads" ${item?.adType==='Facebook Ads'?'selected':''}>Facebook Ads</option><option value="Instagram Ad" ${item?.adType==='Instagram Ad'?'selected':''}>Instagram Ad</option><option value="WhatsApp Ad" ${item?.adType==='WhatsApp Ad'?'selected':''}>WhatsApp Ad</option><option value="Other" ${item?.adType==='Other'?'selected':''}>Other</option></select></div></div>
            <div class="form-group"><label>Partner/Occupied By</label><input id="fContact" value="${esc(item?.partnerName||item?.occupiedBy||'')}"></div>`;
          break;
        case 'catalogue':
          const catPartnerOpts = Object.entries(allPartners).map(([pid,p]) => `<option value="${pid}" ${item?.partnerId===pid?'selected':''}>${esc(p.businessName||p.name||pid)}</option>`).join('');
          html += `<div class="form-group"><label>Catalogue Name *</label><input id="fName" value="${esc(item?.name||'')}"></div>
            <div class="form-group"><label>Partner</label><select id="fPartner"><option value="">None</option>${catPartnerOpts}</select></div>
            <div class="form-row"><div class="form-group"><label>Status</label><select id="fStatus"><option value="draft" ${item?.status==='draft'?'selected':''}>Draft</option><option value="active" ${item?.status==='active'?'selected':''}>Active</option></select></div><div class="form-group"><label>Cover Image</label><input id="fNotes" value="${esc(item?.coverImage||'')}" placeholder="Image URL"></div></div>`;
          break;
      }

      html += `<button class="btn btn-gold" style="width:100%;margin-top:0.5rem;" onclick="saveModal()"><i class="fas fa-save"></i> ${id?'Update':'Create'}</button>`;
      document.getElementById('modalContent').innerHTML = html;
      document.getElementById('modalOverlay').classList.add('active');
    };

    window.saveModal = async function() {
      const type = document.getElementById('editType').value;
      const id = document.getElementById('editId').value;
      const name = document.getElementById('fName')?.value?.trim() || '';
      if (!name && type !== 'listing') { toast('Name required', true); return; }

      let data = { updatedAt: Date.now() };
      const pathMap = { partner:'heritage_partners', product:'heritage_products', order:'heritage_orders', listing:'heritage_listings', catalogue:'heritage_catalogues' };

      switch(type) {
        case 'partner':
          data = { ...data, businessName: name, name, contactPerson: document.getElementById('fContact')?.value||'', phone: document.getElementById('fPhone')?.value||'', email: document.getElementById('fEmail')?.value||'', status: document.getElementById('fStatus')?.value||'active', notes: document.getElementById('fNotes')?.value||'' };
          if(!id) data.createdAt = Date.now();
          break;
        case 'product':
          data = { ...data, name, partnerId: document.getElementById('fPartner')?.value||'', price: Number(document.getElementById('fPrice')?.value)||0, stock: Number(document.getElementById('fStock')?.value)||0, isActive: document.getElementById('fStatus')?.value !== 'inactive', description: document.getElementById('fNotes')?.value||'' };
          if(!id) data.createdAt = Date.now();
          break;
        case 'order':
          const pid = document.getElementById('fPartner')?.value||'';
          const prod = allProducts[pid];
          data = { ...data, customerName: name, customerPhone: document.getElementById('fPhone')?.value||'', productId: pid, productName: prod?.name||'', quantity: Number(document.getElementById('fStock')?.value)||1, total: Number(document.getElementById('fPrice')?.value)||0, status: document.getElementById('fStatus')?.value||'pending', customerLocation: document.getElementById('fNotes')?.value||'' };
          if(!id) data.createdAt = Date.now();
          break;
        case 'listing':
          data = { ...data, businessName: name, name, location: document.getElementById('fNotes')?.value||'', adType: document.getElementById('fStatus')?.value||'Other', partnerName: document.getElementById('fContact')?.value||'', occupiedBy: document.getElementById('fContact')?.value||'', status: 'active' };
          if(!id) data.createdAt = Date.now();
          break;
        case 'catalogue':
          data = { ...data, name, partnerId: document.getElementById('fPartner')?.value||'', status: document.getElementById('fStatus')?.value||'draft', coverImage: document.getElementById('fNotes')?.value||'', productIds: [] };
          if(!id) data.createdAt = Date.now();
          break;
      }

      try {
        if(id) { await db.ref(pathMap[type]+'/'+id).update(data); }
        else { await db.ref(pathMap[type]).push(data); }
        closeModal(); toast(id?'Updated!':'Added!');
      } catch(e) { toast('Error saving', true); }
    };

    window.editItem = function(type, id) { openModal(type, id); };
    window.getType = function(id) {
      if(allPartners[id]) return 'partner';
      if(allProducts[id]) return 'product';
      if(allOrders[id]) return 'order';
      if(allListings[id]) return 'listing';
      if(allCatalogues[id]) return 'catalogue';
      return null;
    };
    window.getItem = function(type, id) {
      const map = { partner:allPartners, product:allProducts, order:allOrders, listing:allListings, catalogue:allCatalogues };
      return map[type]?.[id] || null;
    };
    window.closeModal = function() { document.getElementById('modalOverlay').classList.remove('active'); };
    document.getElementById('modalOverlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });

    window.deleteItem = async function(path, id) {
      if(!confirm('Delete this item?')) return;
      try { await db.ref(path+'/'+id).remove(); toast('Deleted'); } catch(e) { toast('Error', true); }
    };

    window.handleLogout = async function() { try { await auth.signOut(); window.location.href='/'; } catch(e) { toast('Error', true); } };

    // Firebase listeners
    const nodes = ['heritage_partners', 'heritage_products', 'heritage_orders', 'heritage_listings', 'heritage_catalogues'];
    const maps = [allPartners, allProducts, allOrders, allListings, allCatalogues];
    nodes.forEach((node, i) => {
      db.ref(node).on('value', snap => {
        Object.assign(maps[i], snap.val()||{});
        renderAll();
      });
    });

    auth.onAuthStateChanged(user => {
      if(!user) { window.location.href='/'; return; }
      document.getElementById('userAvatar').textContent = (user.displayName || user.email?.[0] || 'M')[0].toUpperCase();
      document.getElementById('userName').textContent = user.displayName || user.email?.split('@')[0] || 'Manager';
      renderAll();
    });

    // Fix close modal on ESC
    document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
