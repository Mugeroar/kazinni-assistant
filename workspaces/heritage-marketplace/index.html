<!DOCTYPE html>
<html>
<head>
  <title>Heritage Partners - Debug</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
  <h1>Heritage Partners</h1>
  <div id="output">Loading...</div>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc"
    });

    const db = firebase.database();
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
      if (!user) {
        document.getElementById('output').innerHTML = '❌ Not logged in';
        return;
      }
      
      document.getElementById('output').innerHTML = `✅ Logged in as: ${user.email}<br>UID: ${user.uid}<br><br>Loading data...`;

      // Read data with error handling
      db.ref('heritage_partners').once('value')
        .then(snap => {
          const data = snap.val();
          console.log('Data:', data);
          
          if (!data) {
            document.getElementById('output').innerHTML += '<br>⚠️ No data found at heritage_partners';
            return;
          }
          
          let html = '<br><strong>Partners:</strong><br><ul>';
          Object.entries(data).forEach(([id, partner]) => {
            html += `<li>${partner.businessName || partner.name || id} - ${partner.status || 'active'}</li>`;
          });
          html += '</ul>';
          document.getElementById('output').innerHTML += html;
        })
        .catch(err => {
          document.getElementById('output').innerHTML += `<br>❌ Error: ${err.message}`;
          console.error('Error:', err);
        });
    });
  </script>
</body>
</html>
