<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Heritage Marketplace · Partners</title>
  <meta name="theme-color" content="#d97706">
  <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --gold: #d97706; --gold-dark: #92400e; --gold-light: #fbbf24;
      --gold-bg: #fffbeb; --gold-border: #fde68a;
      --navy: #0f172a; --navy-light: #1e293b;
      --text: #1e293b; --text-muted: #64748b; --text-light: #94a3b8;
      --bg: #f8fafc; --white: #ffffff;
      --success: #10b981; --danger: #ef4444; --info: #3b82f6; --warning: #f59e0b;
      --border: #e2e8f0; --border-light: #f1f5f9;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
      --radius: 12px; --radius-lg: 16px; --radius-xl: 20px;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── TOP NAV ─── */
    .topbar {
      background: var(--navy); color: white; padding: 0 1.5rem; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 3px solid var(--gold); position: sticky; top:0; z-index:100;
      flex-wrap: wrap; gap: 0.5rem;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.1rem; text-decoration: none; cursor:pointer; }
    .brand img { width: 34px; height: 34px; border-radius: 10px; background: white; padding: 2px; }
    .brand i { color: var(--gold); }
    .brand span { color: white; }
    .brand .gold { color: var(--gold); }

    .nav-center { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .nav-btn {
      background: transparent; border: none; color: rgba(255,255,255,0.6);
      padding: 0.4rem 0.9rem; border-radius: 8px; font-weight: 600; font-size: 0.7rem;
      cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
      transition: all 0.2s; font-family: inherit; text-decoration: none;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.1); color: white; }
    .nav-btn.active { background: var(--gold); color: white; }

    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .user-menu { position: relative; }
    .user-btn {
      display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.08);
      padding: 0.2rem 0.9rem 0.2rem 0.3rem; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer; transition: all 0.2s; font-family: inherit; color: white;
    }
    .user-btn:hover { background: rgba(255,255,255,0.15); }
    .user-btn .avatar {
      width: 30px; height: 30px; border-radius: 50%; background: var(--gold);
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.7rem;
      color: white; flex-shrink:0;
    }
    .user-btn .name { font-size: 0.75rem; max-width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-btn .chevron { font-size: 0.6rem; color: rgba(255,255,255,0.5); }

    .dropdown {
      position: absolute; top: 48px; right: 0; background: var(--white); border-radius: var(--radius-lg);
      min-width: 240px; box-shadow: var(--shadow-lg); border: 1px solid var(--border-light);
      opacity: 0; visibility: hidden; transform: translateY(-8px); transition: all 0.25s; z-index:200;
    }
    .dropdown.open { opacity: 1; visibility: visible; transform: translateY(0); }
    .dropdown-header {
      padding: 0.8rem 1rem; border-bottom: 1px solid var(--border-light);
      display: flex; align-items: center; gap: 10px;
    }
    .dropdown-avatar {
      width: 40px; height: 40px; border-radius: 50%; background: var(--gold);
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem;
      color: white; flex-shrink:0;
    }
    .dropdown-info .name { font-weight: 700; font-size: 0.8rem; color: var(--text); }
    .dropdown-info .email { font-size: 0.65rem; color: var(--text-muted); }
    .dropdown-info .role { font-size: 0.6rem; color: var(--gold); font-weight: 600; margin-top: 2px; }
    .dropdown-item {
      display: flex; align-items: center; gap: 10px; padding: 0.6rem 1rem;
      font-size: 0.75rem; color: var(--text-muted); cursor: pointer; border: none;
      background: none; width: 100%; font-family: inherit; text-align: left;
      transition: all 0.15s; text-decoration: none;
    }
    .dropdown-item:hover { background: var(--gold-bg); color: var(--text); }
    .dropdown-item i { width: 18px; text-align: center; color: var(--gold); }
    .dropdown-divider { height: 1px; background: var(--border-light); margin: 0.3rem 0; }
    .dropdown-item.danger { color: var(--danger); }
    .dropdown-item.danger:hover { background: #fef2f2; }
    .dropdown-item.danger i { color: var(--danger); }

    /* ─── MAIN ─── */
    .main { max-width: 1280px; margin: 0 auto; padding: 1.2rem; }

    .page-header {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1.2rem;
    }
    .page-header h1 { font-size: 1.4rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
    .page-header h1 i { color: var(--gold); }
    .page-header .subtitle { font-size: 0.75rem; color: var(--text-muted); font-weight: 400; }

    /* ─── STATS ─── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--white); border-radius: var(--radius); padding: 1rem 1.2rem;
      border: 1px solid var(--gold-border); box-shadow: var(--shadow);
      transition: all 0.25s; cursor: default;
    }
    .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .stat-card .num { font-size: 1.8rem; font-weight: 800; color: var(--gold-dark); line-height: 1.1; }
    .stat-card .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-top: 2px; }
    .stat-card .icon { float: right; font-size: 1.2rem; color: var(--gold-light); opacity: 0.5; }

    /* ─── FILTERS ─── */
    .filter-bar {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center;
    }
    .filter-btn {
      padding: 0.35rem 0.9rem; border-radius: 20px; border: 1.5px solid var(--border);
      background: var(--white); color: var(--text-muted); font-weight: 600; font-size: 0.65rem;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--gold); color: var(--gold-dark); }
    .filter-btn.active { background: var(--gold); color: white; border-color: var(--gold); }
    .search-box { flex: 1; min-width: 150px; max-width: 300px; position: relative; }
    .search-box input {
      width: 100%; padding: 0.35rem 0.8rem 0.35rem 2rem; border-radius: 20px;
      border: 1.5px solid var(--border); font-size: 0.7rem; font-family: 'Inter', sans-serif;
      background: var(--white); outline: none; transition: 0.2s;
    }
    .search-box input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(217,119,6,0.08); }
    .search-box i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-light); font-size: 0.7rem; }

    .btn {
      padding: 0.5rem 1rem; border-radius: 10px; border: none; font-weight: 700;
      font-size: 0.7rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 5px; font-family: inherit; transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--gold); color: white; }
    .btn-primary:hover { background: var(--gold-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(217,119,6,0.3); }
    .btn-secondary { background: var(--border-light); color: var(--text-muted); }
    .btn-secondary:hover { background: var(--border); }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.65rem; }
    .btn-xs { padding: 0.2rem 0.5rem; font-size: 0.6rem; border-radius: 6px; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #059669; }

    /* ─── PARTNER CARDS ─── */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }

    .partner-card {
      background: var(--white); border-radius: var(--radius-lg); padding: 1.3rem;
      border: 1px solid var(--gold-border); box-shadow: var(--shadow);
      transition: all 0.25s; display: flex; gap: 1rem;
    }
    .partner-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--gold-light); }
    .partner-avatar {
      width: 50px; height: 50px; border-radius: 14px; flex-shrink:0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1.1rem; color: white;
    }
    .partner-info { flex: 1; min-width:0; }
    .partner-info h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.3rem; }
    .partner-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 0.5rem; }
    .meta-tag {
      font-size: 0.6rem; padding: 0.12rem 0.5rem; border-radius: 8px;
      font-weight: 600; background: var(--border-light); color: var(--text-muted);
    }
    .meta-tag.industry { background: var(--gold-bg); color: var(--gold-dark); }
    .meta-tag.products { background: #ecfdf5; color: #065f46; }
    .meta-tag.tier { background: #eff6ff; color: #1d4ed8; }
    .partner-contact { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 0.6rem; display: flex; flex-wrap: wrap; gap: 8px; }
    .partner-contact span { display: flex; align-items: center; gap: 3px; }
    .partner-contact i { color: var(--gold); font-size: 0.55rem; }
    .partner-actions { display: flex; gap: 4px; flex-wrap: wrap; }
    .btn-sm {
      padding: 0.25rem 0.6rem; border-radius: 8px; border: none; font-weight: 600;
      font-size: 0.6rem; cursor: pointer; display: inline-flex; align-items: center;
      gap: 3px; transition: all 0.15s; font-family: inherit;
    }
    .btn-edit { background: var(--gold-bg); color: var(--gold-dark); }
    .btn-edit:hover { background: var(--gold); color: white; }
    .btn-view { background: #eff6ff; color: #1d4ed8; }
    .btn-view:hover { background: var(--info); color: white; }
    .btn-delete { background: #fee2e2; color: #991b1b; }
    .btn-delete:hover { background: var(--danger); color: white; }

    .badge {
      padding: 0.15rem 0.6rem; border-radius: 6px; font-size: 0.6rem;
      font-weight: 600; text-transform: capitalize;
    }
    .badge-success { background: #ecfdf5; color: #065f46; }
    .badge-warning { background: #fffbeb; color: #92400e; }
    .badge-danger { background: #fef2f2; color: #991b1b; }
    .badge-info { background: #eff6ff; color: #1e40af; }
    .badge-neutral { background: var(--border-light); color: var(--text-muted); }

    .empty-state { text-align: center; padding: 3rem; color: var(--text-light); grid-column:1/-1; }
    .empty-state i { font-size: 2.5rem; display: block; margin-bottom: 0.8rem; opacity:0.4; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed; inset:0; background: rgba(15,23,42,0.5);
      backdrop-filter: blur(4px); display: none; align-items: center;
      justify-content: center; z-index:300; padding:1rem;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--white); border-radius: var(--radius-xl);
      padding: 1.5rem; width:100%; max-width:560px; max-height:85vh;
      overflow-y: auto; box-shadow: var(--shadow-lg);
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn { from { opacity:0; transform:scale(0.95) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem;
    }
    .modal-header h3 { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .modal-header h3 i { color: var(--gold); }
    .modal-close {
      width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border);
      background: var(--white); cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.2s; font-size:0.8rem;
    }
    .modal-close:hover { background: #fef2f2; color: var(--danger); border-color: var(--danger); }

    .form-group { margin-bottom: 0.8rem; }
    .form-group label {
      display: block; font-weight: 600; font-size: 0.7rem;
      color: var(--text-muted); margin-bottom: 0.2rem; text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; padding:0.5rem 0.8rem; border:1.5px solid var(--border);
      border-radius:8px; font-family:'Inter',sans-serif; font-size:0.8rem;
      background:var(--bg); outline:none; transition:0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--gold); box-shadow:0 0 0 3px rgba(217,119,6,0.08);
      background: var(--white);
    }
    .form-row { display: grid; grid-template-columns:1fr 1fr; gap:0.8rem; }
    .form-actions { display: flex; gap: 8px; margin-top: 1rem; }
    .form-actions .btn { flex:1; justify-content:center; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 400; padding: 0.7rem 1.5rem; border-radius: 12px;
      font-size: 0.75rem; font-weight: 600; box-shadow: var(--shadow-lg);
      background: var(--navy); color: white; display: none; max-width: 90%;
      animation: toastIn 0.3s ease;
    }
    .toast.error { background: var(--danger); }
    .toast.success { background: var(--success); }
    @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(15px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

    @media (max-width: 768px) {
      .topbar { padding: 0.5rem 1rem; height: auto; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .form-row { grid-template-columns:1fr; }
      .page-header h1 { font-size: 1.1rem; }
      .cards-grid { grid-template-columns:1fr; }
      .nav-center { display: none; }
      .nav-center.mobile-show { display: flex; flex-wrap: wrap; width:100%; padding:0.5rem 0; }
    }
  </style>
</head>
<body>

  <!-- ─── TOPBAR ─── -->
  <nav class="topbar">
    <div class="brand" onclick="location.href='/'">
      <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="">
      <span><i class="fas fa-crown"></i> Heritage <span class="gold">Marketplace</span></span>
    </div>

    <div class="nav-center" id="navCenter">
      <a href="/workspaces/heritage-marketplace/index.html" class="nav-btn"><i class="fas fa-chart-pie"></i> Dashboard</a>
      <a href="/workspaces/heritage-marketplace/heritage-partners.html" class="nav-btn active"><i class="fas fa-handshake"></i> Partners</a>
      <a href="/workspaces/heritage-marketplace/heritage-products.html" class="nav-btn"><i class="fas fa-box"></i> Catalogue</a>
      <a href="/workspaces/heritage-marketplace/heritage-orders.html" class="nav-btn"><i class="fas fa-shopping-cart"></i> Orders</a>
      <a href="/workspaces/heritage-marketplace/heritage-catalogues.html" class="nav-btn"><i class="fas fa-images"></i> Catalogues</a>
    </div>

    <div class="topbar-right">
      <button class="btn btn-primary btn-sm" onclick="openModal()"><i class="fas fa-plus"></i> Add Partner</button>
      <div class="user-menu" id="userMenu">
        <button class="user-btn" onclick="toggleDropdown()">
          <div class="avatar" id="userAvatar">HM</div>
          <span class="name" id="userName">Manager</span>
          <span class="chevron"><i class="fas fa-chevron-down"></i></span>
        </button>
        <div class="dropdown" id="dropdown">
          <div class="dropdown-header">
            <div class="dropdown-avatar" id="dropAvatar">HM</div>
            <div class="dropdown-info">
              <div class="name" id="dropName">Manager</div>
              <div class="email" id="dropEmail">user@example.com</div>
              <div class="role"><i class="fas fa-crown"></i> Marketplace Admin</div>
            </div>
          </div>
          <button class="dropdown-item" onclick="location.href='/workspaces/heritage-marketplace/index.html'"><i class="fas fa-chart-pie"></i> Dashboard</button>
          <button class="dropdown-item" onclick="location.href='/workspaces/heritage-marketplace/heritage-partners.html'"><i class="fas fa-handshake"></i> Partners</button>
          <button class="dropdown-item" onclick="location.href='/workspaces/heritage-marketplace/heritage-products.html'"><i class="fas fa-box"></i> Catalogue</button>
          <button class="dropdown-item" onclick="location.href='/workspaces/heritage-marketplace/heritage-orders.html'"><i class="fas fa-shopping-cart"></i> Orders</button>
          <button class="dropdown-item" onclick="location.href='/workspaces/heritage-marketplace/heritage-catalogues.html'"><i class="fas fa-images"></i> Catalogues</button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item" onclick="location.href='/workspaces/index.html'"><i class="fas fa-arrow-left"></i> All Workspaces</button>
          <button class="dropdown-item danger" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- ─── MAIN ─── -->
  <div class="main">
    <div class="page-header">
      <div>
        <h1><i class="fas fa-handshake"></i> Business Partners</h1>
        <span class="subtitle"><i class="fas fa-circle" style="color:var(--gold);font-size:0.4rem;"></i> Manage your business partners and their products</span>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">Total Partners</div><div class="icon"><i class="fas fa-building"></i></div></div>
      <div class="stat-card"><div class="num" id="statActive">0</div><div class="label">Active</div><div class="icon"><i class="fas fa-check-circle"></i></div></div>
      <div class="stat-card"><div class="num" id="statInactive">0</div><div class="label">Inactive</div><div class="icon"><i class="fas fa-pause-circle"></i></div></div>
      <div class="stat-card"><div class="num" id="statPremium">0</div><div class="label">Premium</div><div class="icon"><i class="fas fa-star"></i></div></div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">✅ Active</button>
      <button class="filter-btn" data-filter="inactive">⛔ Inactive</button>
      <button class="filter-btn" data-filter="premium">⭐ Premium</button>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search partners...">
      </div>
      <span style="font-size:0.65rem;color:var(--text-muted);margin-left:auto;" id="resultCount">0 partners</span>
    </div>

    <!-- Partner Cards -->
    <div class="cards-grid" id="partnersGrid">
      <div class="empty-state"><i class="fas fa-handshake"></i><p>Loading partners...</p></div>
    </div>
  </div>

  <!-- ─── MODAL ─── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent">
      <div class="modal-header">
        <h3><i class="fas fa-user-plus"></i> <span id="modalTitle">Add Partner</span></h3>
        <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <input type="hidden" id="editId" value="">
      <div class="form-row">
        <div class="form-group"><label>Business Name *</label><input type="text" id="fName" placeholder="e.g., Gifted Woodworks"></div>
        <div class="form-group"><label>Contact Person</label><input type="text" id="fContact" placeholder="Full name"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Phone</label><input type="text" id="fPhone" placeholder="+254..."></div>
        <div class="form-group"><label>Email</label><input type="email" id="fEmail" placeholder="partner@email.com"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Industry</label>
          <select id="fIndustry">
            <option value="Fashion">👗 Fashion</option>
            <option value="Food">🍽️ Food</option>
            <option value="Electronics">📱 Electronics</option>
            <option value="Home Goods">🏠 Home Goods</option>
            <option value="Beauty">💄 Beauty</option>
            <option value="Agriculture">🌾 Agriculture</option>
            <option value="Other">📦 Other</option>
          </select>
        </div>
        <div class="form-group"><label>Tier</label>
          <select id="fTier">
            <option value="standard">Standard</option>
            <option value="premium">⭐ Premium</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Location</label><input type="text" id="fLocation" placeholder="City/Area"></div>
        <div class="form-group"><label>Status</label>
          <select id="fStatus">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Notes</label><textarea id="fNotes" rows="2" placeholder="Additional notes..."></textarea></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="savePartner()"><i class="fas fa-save"></i> <span id="saveBtnText">Save Partner</span></button>
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ─── TOAST ─── -->
  <div id="toast" class="toast"></div>

  <!-- ─── FIREBASE ─── -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
      authDomain: "mugera-e51cc.firebaseapp.com",
      databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "mugera-e51cc",
      storageBucket: "mugera-e51cc.firebasestorage.app"
    });

    const auth = firebase.auth();
    const db = firebase.database();

    let allPartners = {};
    let allProducts = {};
    let currentFilter = 'all';
    let searchQuery = '';
    let currentUser = null;

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function toast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (type || '');
      t.style.display = 'block';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.style.display = 'none', 3000);
    }

    function toggleDropdown() {
      document.getElementById('dropdown').classList.toggle('open');
    }

    // Close dropdown on outside click
    document.addEventListener('click', function(e) {
      const menu = document.getElementById('userMenu');
      if (menu && !menu.contains(e.target)) {
        document.getElementById('dropdown').classList.remove('open');
      }
    });

    function getInitials(name) {
      if (!name) return 'HM';
      return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
    }

    function getAvatarColor(str) {
      const colors = ['#d97706','#92400e','#b45309','#a16207','#ca8a04','#eab308','#f59e0b','#dc2626','#7c3aed','#2563eb','#059669','#db2777'];
      let hash = 0;
      for (let i = 0; i < (str || '').length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      return colors[Math.abs(hash) % colors.length];
    }

    function getProductCount(partnerId) {
      return Object.values(allProducts).filter(p => p && p.partnerId === partnerId).length;
    }

    function updateStats() {
      const partners = Object.values(allPartners);
      const total = partners.length;
      const active = partners.filter(p => p.status === 'active' || !p.status).length;
      const inactive = partners.filter(p => p.status === 'inactive').length;
      const premium = partners.filter(p => p.tier === 'premium').length;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statActive').textContent = active;
      document.getElementById('statInactive').textContent = inactive;
      document.getElementById('statPremium').textContent = premium;
    }

    function renderPartners() {
      const grid = document.getElementById('partnersGrid');
      let partners = Object.entries(allPartners).map(([id, data]) => ({ id, ...data }));

      if (currentFilter === 'active') {
        partners = partners.filter(p => p.status === 'active' || !p.status);
      } else if (currentFilter === 'inactive') {
        partners = partners.filter(p => p.status === 'inactive');
      } else if (currentFilter === 'premium') {
        partners = partners.filter(p => p.tier === 'premium');
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        partners = partners.filter(p =>
          (p.businessName || p.name || '').toLowerCase().includes(q) ||
          (p.phone || '').toLowerCase().includes(q) ||
          (p.email || '').toLowerCase().includes(q) ||
          (p.industry || '').toLowerCase().includes(q)
        );
      }

      document.getElementById('resultCount').textContent = partners.length + ' partners';

      if (!partners.length) {
        grid.innerHTML = `<div class="empty-state"><i class="fas fa-handshake"></i><p>${Object.keys(allPartners).length ? 'No matches found' : 'No partners yet. Add your first partner!'}</p></div>`;
        return;
      }

      grid.innerHTML = partners.map(p => {
        const name = p.businessName || p.name || 'Partner';
        const initials = getInitials(name);
        const color = getAvatarColor(name);
        const productCount = getProductCount(p.id);
        const status = p.status || 'active';
        const tier = p.tier || 'standard';

        return `
          <div class="partner-card">
            <div class="partner-avatar" style="background:${color};">${initials}</div>
            <div class="partner-info">
              <h3>${esc(name)}</h3>
              <div class="partner-meta">
                <span class="meta-tag industry"><i class="fas fa-tag"></i> ${esc(p.industry || 'General')}</span>
                <span class="meta-tag products"><i class="fas fa-box"></i> ${productCount} products</span>
                ${tier === 'premium' ? '<span class="meta-tag tier"><i class="fas fa-star"></i> Premium</span>' : ''}
                <span style="font-size:0.6rem;padding:0.12rem 0.5rem;border-radius:8px;font-weight:600;background:${status === 'active' || !status ? '#d1fae5' : '#fee2e2'};color:${status === 'active' || !status ? '#065f46' : '#991b1b'};">${status === 'active' || !status ? 'Active' : 'Inactive'}</span>
              </div>
              <div class="partner-contact">
                ${p.phone ? `<span><i class="fas fa-phone"></i> ${esc(p.phone)}</span>` : ''}
                ${p.email ? `<span><i class="fas fa-envelope"></i> ${esc(p.email)}</span>` : ''}
                ${p.location ? `<span><i class="fas fa-map-marker-alt"></i> ${esc(p.location)}</span>` : ''}
              </div>
              ${p.notes ? `<p style="font-size:0.65rem;color:var(--text-muted);margin-bottom:0.5rem;">📝 ${esc(p.notes.substring(0, 60))}${p.notes.length > 60 ? '...' : ''}</p>` : ''}
              <div class="partner-actions">
                <button class="btn-sm btn-edit" onclick="editPartner('${p.id}')"><i class="fas fa-edit"></i> Edit</button>
                <button class="btn-sm btn-view" onclick="viewPartner('${p.id}')"><i class="fas fa-eye"></i> View</button>
                <button class="btn-sm btn-delete" onclick="deletePartner('${p.id}')"><i class="fas fa-trash"></i> Delete</button>
              </div>
            </div>
          </div>`;
      }).join('');

      updateStats();
    }

    // ─── MODAL ───
    function openModal(partnerId) {
      const isEdit = !!partnerId;
      const p = isEdit ? allPartners[partnerId] : null;

      document.getElementById('modalTitle').textContent = isEdit ? 'Edit Partner' : 'Add Partner';
      document.getElementById('saveBtnText').textContent = isEdit ? 'Update Partner' : 'Save Partner';
      document.getElementById('editId').value = partnerId || '';

      document.getElementById('fName').value = p?.businessName || p?.name || '';
      document.getElementById('fContact').value = p?.contactPerson || '';
      document.getElementById('fPhone').value = p?.phone || '';
      document.getElementById('fEmail').value = p?.email || '';
      document.getElementById('fIndustry').value = p?.industry || 'Other';
      document.getElementById('fTier').value = p?.tier || 'standard';
      document.getElementById('fLocation').value = p?.location || '';
      document.getElementById('fStatus').value = p?.status || 'active';
      document.getElementById('fNotes').value = p?.notes || '';

      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    // Close modal on backdrop click
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // Close modal on ESC
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    async function savePartner() {
      const name = document.getElementById('fName').value.trim();
      if (!name) { toast('Business name is required', 'error'); return; }

      const id = document.getElementById('editId').value;
      const data = {
        businessName: name,
        name: name,
        contactPerson: document.getElementById('fContact').value.trim(),
        phone: document.getElementById('fPhone').value.trim(),
        email: document.getElementById('fEmail').value.trim(),
        industry: document.getElementById('fIndustry').value,
        tier: document.getElementById('fTier').value,
        location: document.getElementById('fLocation').value.trim(),
        status: document.getElementById('fStatus').value,
        notes: document.getElementById('fNotes').value.trim(),
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      };

      try {
        if (id) {
          await db.ref('heritage_partners/' + id).update(data);
          toast('✅ Partner updated!', 'success');
        } else {
          data.createdAt = firebase.database.ServerValue.TIMESTAMP;
          await db.ref('heritage_partners').push(data);
          toast('✅ Partner added!', 'success');
        }
        closeModal();
      } catch (e) {
        toast('❌ Error: ' + e.message, 'error');
      }
    }

    function editPartner(id) { openModal(id); }

    function viewPartner(id) {
      const p = allPartners[id];
      if (!p) return;
      const name = p.businessName || p.name || 'Partner';
      const productCount = getProductCount(id);
      const products = Object.entries(allProducts).filter(([_, pr]) => pr && pr.partnerId === id);

      // Use a simple alert for now - you could extend this to a dedicated view modal
      let msg = `📋 ${name}\n`;
      msg += `Contact: ${p.contactPerson || 'N/A'}\n`;
      msg += `Phone: ${p.phone || 'N/A'}\n`;
      msg += `Email: ${p.email || 'N/A'}\n`;
      msg += `Industry: ${p.industry || 'N/A'}\n`;
      msg += `Tier: ${p.tier || 'Standard'}\n`;
      msg += `Status: ${p.status || 'Active'}\n`;
      msg += `Products: ${productCount}\n`;
      if (p.notes) msg += `Notes: ${p.notes}`;
      alert(msg);
    }

    async function deletePartner(id) {
      if (!confirm('Delete this partner? This will NOT delete their products.')) return;
      try {
        await db.ref('heritage_partners/' + id).remove();
        toast('✅ Deleted', 'success');
      } catch (e) {
        toast('❌ Error: ' + e.message, 'error');
      }
    }

    // ─── LOGOUT ───
    async function handleLogout() {
      try {
        await auth.signOut();
        window.location.href = '/workspaces/index.html';
      } catch (e) {
        toast('Error signing out', 'error');
      }
    }

    // ─── FILTERS ───
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentFilter = this.dataset.filter;
        renderPartners();
      });
    });

    document.getElementById('searchInput').addEventListener('input', function(e) {
      searchQuery = this.value;
      renderPartners();
    });

    // ─── FIREBASE LISTENERS ───
    db.ref('heritage_partners').on('value', snap => {
      allPartners = snap.val() || {};
      renderPartners();
    });

    db.ref('heritage_products').on('value', snap => {
      allProducts = snap.val() || {};
      renderPartners();
    });

    // ─── AUTH ───
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = '/workspaces/index.html';
        return;
      }
      currentUser = user;
      const name = user.displayName || user.email?.split('@')[0] || 'Manager';
      const initial = getInitials(name);

      document.getElementById('userName').textContent = name;
      document.getElementById('userAvatar').textContent = initial;
      document.getElementById('dropName').textContent = name;
      document.getElementById('dropAvatar').textContent = initial;
      document.getElementById('dropEmail').textContent = user.email || '';
    });

    // Expose functions to global scope
    window.openModal = openModal;
    window.closeModal = closeModal;
    window.savePartner = savePartner;
    window.editPartner = editPartner;
    window.viewPartner = viewPartner;
    window.deletePartner = deletePartner;
    window.toggleDropdown = toggleDropdown;
    window.handleLogout = handleLogout;
  </script>
</body>
</html>
