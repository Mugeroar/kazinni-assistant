<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kitchen Dashboard | Mugs N Dines</title>
    
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --orange: #f97316;
            --orange-dark: #c2410c;
            --orange-light: #fb923c;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-muted: #64748b;
            --border-light: #fed7aa;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --purple: #8b5cf6;
            --emerald: #059669;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #fff7ed 0%, #ffffff 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(249, 115, 22, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-img {
            height: 36px;
            width: 36px;
            border-radius: 10px;
            object-fit: contain;
            background: white;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2);
        }

        .logo-text {
            font-weight: 800;
            font-size: 1rem;
            background: linear-gradient(145deg, #fb923c, #c2410c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .kitchen-badge {
            background: var(--orange);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.6rem;
            font-weight: 700;
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--orange-dark);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Drawer Menu */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
            backdrop-filter: blur(4px);
        }

        .drawer {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            transition: left 0.3s ease;
            z-index: 1001;
            display: flex;
            flex-direction: column;
        }

        .drawer.open { left: 0; }

        .drawer-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .drawer-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .drawer-logo-img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: white;
        }

        .drawer-logo-text {
            font-weight: 800;
            font-size: 0.85rem;
            background: linear-gradient(135deg, #f97316, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .drawer-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .drawer-user {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .drawer-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #f97316, #c2410c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
        }

        .drawer-user-info h4 {
            font-size: 0.8rem;
            color: white;
        }

        .drawer-user-info p {
            font-size: 0.6rem;
            color: #94a3b8;
        }

        .drawer-nav {
            flex: 1;
            padding: 1rem 0;
        }

        .drawer-nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.7rem 1.5rem;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .drawer-nav-item:hover {
            background: rgba(249, 115, 22, 0.15);
            color: var(--orange-light);
        }

        .drawer-nav-item i { width: 20px; }

        .drawer-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .drawer-logout {
            width: 100%;
            padding: 0.7rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            color: #ef4444;
            font-weight: 600;
            cursor: pointer;
        }

        /* Main Content */
        .container {
            padding: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header { margin-bottom: 1rem; }
        .page-header h1 { font-size: 1.2rem; font-weight: 800; color: #0f172a; }
        .page-header p { font-size: 0.7rem; color: var(--text-muted); }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 1rem;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 0.8rem;
            text-align: center;
            border: 1px solid var(--border-light);
        }

        .stat-number { font-size: 1.6rem; font-weight: 800; color: var(--orange-dark); }
        .stat-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }

        /* No Kitchen State */
        .no-kitchen-state {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            border: 1px solid var(--border-light);
            margin: 1rem 0;
        }

        .no-kitchen-state i { font-size: 3rem; color: var(--orange); margin-bottom: 1rem; display: block; }
        .no-kitchen-state h3 { font-size: 1rem; margin-bottom: 0.5rem; }
        .no-kitchen-state p { font-size: 0.7rem; color: var(--text-muted); }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: 4px;
            background: #f8fafc;
            border-radius: 30px;
            padding: 4px;
            margin-bottom: 1rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.5rem;
            border-radius: 26px;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--orange);
            color: white;
            box-shadow: 0 4px 12px rgba(249,115,22,0.2);
        }

        .tab-badge {
            background: rgba(0,0,0,0.1);
            padding: 1px 6px;
            border-radius: 10px;
            margin-left: 4px;
            font-size: 0.55rem;
        }

        .tab-btn.active .tab-badge { background: rgba(255,255,255,0.2); }

        /* Order List */
        .order-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .order-card {
            background: white;
            border-radius: 16px;
            padding: 1rem;
            border: 1px solid var(--border-light);
            transition: all 0.2s;
        }

        .order-card.new { border-left: 3px solid var(--orange); }
        .order-card.preparing { border-left: 3px solid var(--info); background: #f0f9ff; }
        .order-card.ready { border-left: 3px solid var(--success); background: #f0fdf4; }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
            gap: 5px;
        }

        .order-id {
            font-size: 0.65rem;
            color: var(--text-muted);
            background: #f8fafc;
            padding: 2px 8px;
            border-radius: 8px;
        }

        .order-status {
            font-size: 0.6rem;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 700;
        }

        .status-new { background: #fef3c7; color: #92400e; }
        .status-preparing { background: #e0f2fe; color: #0369a1; }
        .status-ready { background: #d1fae5; color: #065f46; }

        .order-customer {
            font-weight: 800;
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .order-type {
            font-size: 0.55rem;
            padding: 2px 6px;
            border-radius: 8px;
            background: #f1f5f9;
        }

        .order-phone {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }

        .order-items {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin: 0.3rem 0;
            padding: 0.3rem 0;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
        }

        .order-total {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--orange-dark);
            margin-bottom: 0.5rem;
        }

        .order-actions {
            display: flex;
            gap: 8px;
            margin-top: 0.5rem;
        }

        .action-btn {
            padding: 0.4rem 0.8rem;
            border-radius: 10px;
            border: none;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }

        .btn-prepare { background: #e0f2fe; color: #0369a1; }
        .btn-prepare:hover { background: #0284c7; color: white; }
        .btn-ready { background: #d1fae5; color: #065f46; }
        .btn-ready:hover { background: #10b981; color: white; }
        .btn-view { background: #f1f5f9; color: #475569; }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 1.2rem;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.25s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-light);
        }

        .modal-header i { color: var(--orange); }
        .modal-header h3 { font-size: 0.9rem; font-weight: 800; }
        .modal-close {
            margin-left: auto;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .detail-item {
            background: #f8fafc;
            padding: 0.6rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
        }

        .detail-item strong {
            display: block;
            font-size: 0.6rem;
            color: var(--orange-dark);
            margin-bottom: 0.2rem;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 0.7rem;
            border-radius: 12px;
            text-align: center;
            z-index: 3000;
            animation: slideUp 0.3s ease;
        }

        .toast.error { background: var(--danger); }

        .footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.6rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-light);
            margin-top: 1rem;
        }

        @media (max-width: 600px) {
            .stats-row { grid-template-columns: repeat(3, 1fr); }
            .order-actions { flex-direction: column; }
            .action-btn { justify-content: center; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" alt="Mugs N Dines" class="logo-img">
            <span class="logo-text">Mugs N Dines</span>
            <span class="kitchen-badge" id="kitchenName">Loading...</span>
        </div>
        <button class="menu-btn" id="menuBtn">
            <i class="fas fa-bars"></i>
        </button>
    </nav>

    <!-- Drawer Menu -->
    <div class="drawer-overlay" id="drawerOverlay">
        <div class="drawer" id="drawer">
            <div class="drawer-header">
                <div class="drawer-logo">
                    <img src="https://i.postimg.cc/rFfXDj3L/kazinni-removebg-preview(1).png" class="drawer-logo-img">
                    <span class="drawer-logo-text">Mugs N Dines</span>
                </div>
                <button class="drawer-close" id="drawerClose"><i class="fas fa-times"></i></button>
            </div>
            <div class="drawer-user" id="drawerUser">
                <div class="drawer-avatar" id="drawerAvatar">MD</div>
                <div class="drawer-user-info">
                    <h4 id="drawerName">Loading...</h4>
                    <p id="drawerEmail">...</p>
                </div>
            </div>
            <div class="drawer-nav">
                <a href="/workspaces/mugsndines/kitchen-dashboard.html" class="drawer-nav-item"><i class="fas fa-fire"></i> Kitchen Orders</a>
                <a href="/workspaces/mugsndines/recipes.html" class="drawer-nav-item"><i class="fas fa-book-open"></i> Recipes</a>
                <a href="/workspaces/mugsndines/menu.html" class="drawer-nav-item"><i class="fas fa-utensils"></i> Menu</a>
            </div>
            <div class="drawer-footer">
                <button class="drawer-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-fire"></i> Kitchen Dashboard</h1>
            <p>Prepare orders and mark them ready for pickup/delivery</p>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card"><div class="stat-number" id="statNew">0</div><div class="stat-label">New Orders</div></div>
            <div class="stat-card"><div class="stat-number" id="statPreparing">0</div><div class="stat-label">Preparing</div></div>
            <div class="stat-card"><div class="stat-number" id="statReady">0</div><div class="stat-label">Ready</div></div>
        </div>

        <!-- Tabs -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="new" onclick="switchTab('new')">New <span class="tab-badge" id="badgeNew">0</span></button>
            <button class="tab-btn" data-tab="preparing" onclick="switchTab('preparing')">Preparing <span class="tab-badge" id="badgePreparing">0</span></button>
            <button class="tab-btn" data-tab="ready" onclick="switchTab('ready')">Ready <span class="tab-badge" id="badgeReady">0</span></button>
        </div>

        <div id="newTab" class="tab-content active"><div class="order-list" id="newList"></div></div>
        <div id="preparingTab" class="tab-content" style="display:none;"><div class="order-list" id="preparingList"></div></div>
        <div id="readyTab" class="tab-content" style="display:none;"><div class="order-list" id="readyList"></div></div>
    </div>

    <div class="footer">
        <i class="far fa-copyright"></i> 2026 Mugs N Dines · Kitchen Management
    </div>

    <!-- Order Details Modal -->
    <div class="modal-overlay" id="orderModal">
        <div class="modal">
            <div class="modal-header">
                <i class="fas fa-receipt"></i>
                <h3 id="modalTitle">Order Details</h3>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div id="modalBody"></div>
            <div class="btn-row" id="modalActions" style="display: flex; gap: 8px; margin-top: 1rem; justify-content: flex-end;"></div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7kppUyHUaPzeLBV62NEZWuHiuz1Kz0mA",
            authDomain: "mugera-e51cc.firebaseapp.com",
            databaseURL: "https://mugera-e51cc-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "mugera-e51cc"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let allOrders = {};
        let allKitchens = {};
        let currentTab = 'new';
        let currentKitchenId = null;
        let currentKitchenName = null;

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = isError ? 'toast error' : 'toast';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

        // Load kitchen assignment - reads from mugs_n_dines_franchises (same as Kitchen Management page)
        async function loadKitchenAssignment() {
            const user = auth.currentUser;
            if (!user) return null;

            console.log('Looking up kitchen for user:', user.email);

            // First, load all kitchens from the same source Kitchen Management uses
            const kitchensSnap = await db.ref('mugs_n_dines_franchises').once('value');
            allKitchens = kitchensSnap.val() || {};
            
            // METHOD 1: Check if user's email matches a kitchen's email
            for (const [kitchenId, kitchen] of Object.entries(allKitchens)) {
                if (kitchen.email && kitchen.email.toLowerCase() === user.email.toLowerCase()) {
                    currentKitchenId = kitchenId;
                    currentKitchenName = kitchen.name;
                    console.log('Found kitchen by email match:', currentKitchenName);
                    document.getElementById('kitchenName').textContent = currentKitchenName || 'Kitchen';
                    return true;
                }
            }

            // METHOD 2: Check mugs_n_dines_kitchen_staff by email
            try {
                const staffSnap = await db.ref('mugs_n_dines_kitchen_staff').orderByChild('email').equalTo(user.email).once('value');
                if (staffSnap.exists()) {
                    const staffData = Object.values(staffSnap.val())[0];
                    currentKitchenId = staffData.kitchenId;
                    // Get kitchen name from the kitchens object
                    currentKitchenName = allKitchens[currentKitchenId]?.name || staffData.kitchenName;
                    console.log('Found kitchen via staff record:', currentKitchenName);
                    document.getElementById('kitchenName').textContent = currentKitchenName || 'Kitchen';
                    return true;
                }
            } catch(e) { console.error('Staff lookup error:', e); }

            // METHOD 3: Check users node for kitchenId
            try {
                const userSnap = await db.ref(`users/${user.uid}`).once('value');
                if (userSnap.exists() && userSnap.val().kitchenId) {
                    currentKitchenId = userSnap.val().kitchenId;
                    currentKitchenName = allKitchens[currentKitchenId]?.name || 'Kitchen';
                    console.log('Found kitchen via users node:', currentKitchenName);
                    document.getElementById('kitchenName').textContent = currentKitchenName;
                    return true;
                }
            } catch(e) { console.error('Users node lookup error:', e); }

            console.log('No kitchen assignment found');
            document.getElementById('kitchenName').textContent = 'No Kitchen';
            showNoKitchenState();
            return false;
        }

        function showNoKitchenState() {
            const container = document.querySelector('.container');
            const existing = document.querySelector('.no-kitchen-state');
            if (existing) return;
            
            const noKitchenHtml = `
                <div class="no-kitchen-state">
                    <i class="fas fa-store-alt-slash"></i>
                    <h3>No Kitchen Assigned</h3>
                    <p>Your account is not linked to any kitchen.</p>
                    <p style="font-size:0.65rem; margin-top:0.5rem;">Please contact your administrator to assign you to a kitchen.</p>
                </div>
            `;
            const statsRow = document.querySelector('.stats-row');
            if (statsRow) {
                statsRow.insertAdjacentHTML('afterend', noKitchenHtml);
            }
        }

        function updateStats() {
            const orders = Object.values(allOrders).filter(o => o && o.kitchenId === currentKitchenId);
            const newCount = orders.filter(o => o.status === 'new').length;
            const preparingCount = orders.filter(o => o.status === 'preparing').length;
            const readyCount = orders.filter(o => o.status === 'ready').length;

            document.getElementById('statNew').textContent = newCount;
            document.getElementById('statPreparing').textContent = preparingCount;
            document.getElementById('statReady').textContent = readyCount;
            document.getElementById('badgeNew').textContent = newCount;
            document.getElementById('badgePreparing').textContent = preparingCount;
            document.getElementById('badgeReady').textContent = readyCount;
        }

        function renderOrders() {
            if (!currentKitchenId) return;
            
            const orders = Object.values(allOrders).filter(o => o && o.kitchenId === currentKitchenId);
            
            const newOrders = orders.filter(o => o.status === 'new');
            const preparingOrders = orders.filter(o => o.status === 'preparing');
            const readyOrders = orders.filter(o => o.status === 'ready');

            renderList('newList', newOrders, 'new');
            renderList('preparingList', preparingOrders, 'preparing');
            renderList('readyList', readyOrders, 'ready');
            updateStats();
        }

        function renderList(containerId, orders, type) {
            const container = document.getElementById(containerId);
            if (!orders.length) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-check-circle"></i><p>No ${type} orders</p></div>`;
                return;
            }

            container.innerHTML = orders.map(order => {
                const itemCount = (order.items || []).reduce((sum, i) => sum + (i.quantity || 0), 0);
                const orderTypeIcon = order.orderType === 'delivery' ? '🚚' : '📦';
                let actionButtons = '';
                
                if (type === 'new') {
                    actionButtons = `<button class="action-btn btn-prepare" onclick="updateOrderStatus('${order.id}', 'preparing')"><i class="fas fa-fire"></i> Start Preparing</button>`;
                } else if (type === 'preparing') {
                    actionButtons = `<button class="action-btn btn-ready" onclick="updateOrderStatus('${order.id}', 'ready')"><i class="fas fa-check-circle"></i> Mark Ready</button>`;
                }
                actionButtons += `<button class="action-btn btn-view" onclick="viewOrderDetails('${order.id}')"><i class="fas fa-eye"></i> View</button>`;

                return `
                    <div class="order-card ${type}" onclick="viewOrderDetails('${order.id}')">
                        <div class="order-header">
                            <span class="order-id">#${order.id.slice(-6)}</span>
                            <span class="order-status status-${type}">${type}</span>
                        </div>
                        <div class="order-customer">
                            ${escapeHtml(order.customerName || 'Customer')}
                            <span class="order-type">${orderTypeIcon} ${order.orderType || 'takeaway'}</span>
                        </div>
                        ${order.customerPhone ? `<div class="order-phone">📞 ${escapeHtml(order.customerPhone)}</div>` : ''}
                        <div class="order-items"><strong>${itemCount} item(s)</strong>: ${(order.items || []).slice(0,3).map(i => i.name).join(', ')}${(order.items || []).length > 3 ? '...' : ''}</div>
                        <div class="order-total">💰 KES ${(order.total || 0).toLocaleString()}</div>
                        <div class="order-actions" onclick="event.stopPropagation()">${actionButtons}</div>
                    </div>
                `;
            }).join('');
        }

        window.updateOrderStatus = async (orderId, newStatus) => {
            try {
                const updates = { status: newStatus, updatedAt: firebase.database.ServerValue.TIMESTAMP };
                if (newStatus === 'preparing') updates.startedAt = firebase.database.ServerValue.TIMESTAMP;
                if (newStatus === 'ready') updates.readyAt = firebase.database.ServerValue.TIMESTAMP;
                
                await db.ref(`mugs_n_dines_orders/${orderId}`).update(updates);
                showToast(newStatus === 'preparing' ? '✅ Started preparing order' : '✅ Order marked ready');
                loadOrders();
                closeModal();
            } catch(e) { showToast('Failed to update', true); }
        };

        async function loadOrders() {
            if (!currentKitchenId) return;
            const snap = await db.ref('mugs_n_dines_orders').once('value');
            const orders = snap.val() || {};
            allOrders = Object.entries(orders)
                .map(([id, data]) => ({ id, ...data }))
                .filter(o => o.kitchenId === currentKitchenId && o.status !== 'cancelled' && o.status !== 'delivered')
                .reduce((obj, o) => ({ ...obj, [o.id]: o }), {});
            renderOrders();
        }

        window.viewOrderDetails = (orderId) => {
            const order = allOrders[orderId];
            if (!order) return;
            
            const items = order.items || [];
            const statusClass = `status-${order.status}`;
            const orderTypeIcon = order.orderType === 'delivery' ? '🚚 Delivery' : '📦 Takeaway';
            
            let actionButtons = '';
            if (order.status === 'new') {
                actionButtons = `<button class="action-btn btn-prepare" onclick="updateOrderStatus('${orderId}', 'preparing')"><i class="fas fa-fire"></i> Start Preparing</button>`;
            } else if (order.status === 'preparing') {
                actionButtons = `<button class="action-btn btn-ready" onclick="updateOrderStatus('${orderId}', 'ready')"><i class="fas fa-check-circle"></i> Mark Ready</button>`;
            }
            actionButtons += `<button class="action-btn btn-view" onclick="closeModal()">Close</button>`;

            document.getElementById('modalTitle').textContent = `Order #${orderId.slice(-6)}`;
            document.getElementById('modalBody').innerHTML = `
                <div class="detail-item"><strong>Customer</strong>${escapeHtml(order.customerName)}</div>
                <div class="detail-item"><strong>Phone</strong>${order.customerPhone || '—'}</div>
                <div class="detail-item"><strong>Type</strong>${orderTypeIcon}</div>
                <div class="detail-item"><strong>Status</strong><span class="order-status ${statusClass}">${order.status}</span></div>
                ${order.deliveryAddress ? `<div class="detail-item"><strong>Address</strong>${escapeHtml(order.deliveryAddress)}</div>` : ''}
                <div class="detail-item"><strong>Items</strong>
                    ${items.map(item => `<div style="font-size:0.7rem; padding:0.2rem 0;">${escapeHtml(item.name)} × ${item.quantity} = KES ${((item.price||0)*item.quantity).toLocaleString()}</div>`).join('')}
                </div>
                <div class="detail-item"><strong>Total</strong>KES ${(order.total || 0).toLocaleString()}</div>
                ${order.specialInstructions ? `<div class="detail-item"><strong>Special Instructions</strong>${escapeHtml(order.specialInstructions)}</div>` : ''}
            `;
            document.getElementById('modalActions').innerHTML = actionButtons;
            document.getElementById('orderModal').classList.add('show');
        };

        window.closeModal = () => document.getElementById('orderModal').classList.remove('show');
        window.switchTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
            document.getElementById('newTab').style.display = tab === 'new' ? 'block' : 'none';
            document.getElementById('preparingTab').style.display = tab === 'preparing' ? 'block' : 'none';
            document.getElementById('readyTab').style.display = tab === 'ready' ? 'block' : 'none';
        };

        window.logout = async () => { await auth.signOut(); window.location.href = '/index.html'; };

        // Drawer controls
        document.getElementById('menuBtn').addEventListener('click', () => {
            document.getElementById('drawerOverlay').style.display = 'block';
            document.getElementById('drawer').classList.add('open');
        });
        document.getElementById('drawerClose').addEventListener('click', () => {
            document.getElementById('drawerOverlay').style.display = 'none';
            document.getElementById('drawer').classList.remove('open');
        });
        document.getElementById('drawerOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('drawerOverlay')) {
                document.getElementById('drawerOverlay').style.display = 'none';
                document.getElementById('drawer').classList.remove('open');
            }
        });

        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = '/index.html'; return; }
            document.getElementById('drawerName').textContent = user.displayName || user.email?.split('@')[0] || 'Staff';
            document.getElementById('drawerEmail').textContent = user.email;
            document.getElementById('drawerAvatar').textContent = (user.displayName || user.email?.[0] || 'S').substring(0,2).toUpperCase();
            
            const assigned = await loadKitchenAssignment();
            if (assigned) {
                await loadOrders();
                // Listen for real-time order updates
                db.ref('mugs_n_dines_orders').on('value', () => loadOrders());
            }
        });
    </script>
</body>
</html>
